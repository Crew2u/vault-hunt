<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - FIXED BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    .screen {
      position:fixed;
      inset:0;
      display:none;
    }

    #lobby {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    #gameScreen {
      background:#000;
    }

    #map {
      height:100vh;
      width:100%;
    }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #adminBtn {
      position:absolute;
      bottom:10px;
      right:10px;
      width:40px;
      height:40px;
      opacity:0.05;
      z-index:10000;
    }

    #adminScreen {
      background:#000;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:10000;
    }

    #adminMap {
      width:90%;
      height:60%;
      margin-top:20px;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:34px;
      z-index:9999;
    }

    /* 🔥 ADMIN PULSE DOT */
    .adminDot {
      width:18px;
      height:18px;
      border-radius:50%;
      background:purple;
      box-shadow:0 0 15px purple;
      animation:pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform:scale(1); opacity:1; }
      50% { transform:scale(1.8); opacity:0.4; }
      100% { transform:scale(1); opacity:1; }
    }
  </style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>

  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="hud">Waiting...</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <h2>ADMIN PANEL</h2>
  <button onclick="startGame()">START</button>
  <button onclick="stopGame()">STOP</button>
  <button onclick="exitAdmin()">EXIT</button>

  <div id="adminMap"></div>
</div>

<div id="centerText"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* PLAYER */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team = null;
let isAdmin = false;

/* MAPS */
let map = null;
let adminMap = null;
let adminMarker = null;

/* SCREEN CONTROL */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="flex";
}

/* MAP INIT */
function initMap(){
  if(map) return;

  map = L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19, opacity: 1 }
  ).addTo(map);

  L.polygon([
    [-26.410576,152.925350],
    [-26.410366,152.926038],
    ...
    [-26.410572,152.925348]
  ],{
    color:"#00bfff",
    fillOpacity:0.4
  }).addTo(map);
}

/* ADMIN MAP */
function initAdminMap(){
  if(adminMap) return;

  adminMap = L.map('adminMap').setView([-26.4103,152.9258],18);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19, opacity: 1 }
  ).addTo(adminMap);
}

/* TEAM */
function selectTeam(t){ team = t; }

/* JOIN */
function joinGame(){
  const name = document.getElementById("name").value;
  if(!name || !team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  navigator.geolocation.getCurrentPosition(pos=>{
    db.ref("players/"+playerId).set({
      name, team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  });
}

/* ADMIN LOGIN */
function adminLogin(){
  const code = prompt("Admin Code");
  if(code === "1288"){
    isAdmin = true;

    db.ref("admin/status").set({
      active:true,
      lat:null,
      lng:null
    });

    showScreen("adminScreen");
    initAdminMap();
  }
}

/* ADMIN ACTIONS */
function startGame(){
  db.ref("game").set({state:"live"});
}

function stopGame(){
  db.ref("game").set({state:"ended"});
}

function exitAdmin(){
  isAdmin = false;
  db.ref("admin/status").set({active:false});
  showScreen("lobby");
}

/* GPS */
navigator.geolocation.watchPosition(pos=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  db.ref("players/"+playerId).update({lat,lng});

  if(isAdmin){
    db.ref("admin/status").update({lat,lng});
  }
});

/* PLAYERS */
const markers = {};

db.ref("players").on("value", snap=>{
  const data = snap.val();
  if(!data) return;

  Object.keys(data).forEach(id=>{
    const p = data[id];
    if(!p.lat || !p.lng) return;

    const color = p.team === "red" ? "red" : "lime";

    const icon = L.divIcon({
      html:`<div style="
        width:14px;height:14px;
        background:${color};
        border-radius:50%;
        box-shadow:0 0 10px ${color};
      "></div>`
    });

    if(map){
      if(!markers[id]){
        markers[id] = L.marker([p.lat,p.lng],{icon}).addTo(map);
      } else {
        markers[id].setLatLng([p.lat,p.lng]);
        markers[id].setIcon(icon);
      }
    }

    if(adminMap){
      const aid = "a_"+id;

      if(!markers[aid]){
        markers[aid] = L.marker([p.lat,p.lng],{icon}).addTo(adminMap);
      } else {
        markers[aid].setLatLng([p.lat,p.lng]);
        markers[aid].setIcon(icon);
      }
    }
  });
});

/* 🔥 ADMIN DOT RENDER ON BOTH MAPS */
db.ref("admin/status").on("value", snap=>{
  const a = snap.val();
  if(!a || !a.active || !a.lat) return;

  const icon = L.divIcon({
    className:"",
    html:`<div class="adminDot"></div>`
  });

  if(map){
    if(!adminMarker){
      adminMarker = L.marker([a.lat,a.lng],{icon}).addTo(map);
    } else {
      adminMarker.setLatLng([a.lat,a.lng]);
    }
  }

  if(adminMap){
    if(!window.adminMarker2){
      window.adminMarker2 = L.marker([a.lat,a.lng],{icon}).addTo(adminMap);
    } else {
      window.adminMarker2.setLatLng([a.lat,a.lng]);
    }
  }
});

</script>

</body>
</html>
