<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - SAFE BASE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    .screen {
      position:fixed;
      inset:0;
      display:none;
    }

    #lobby {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    #map, #adminMap {
      width:100%;
      height:100%;
    }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #scoreboardGame {
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
      font-size:18px;
    }

    #adminControls {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:2000;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
      text-align:center;
    }

    #adminControls button {
      margin:5px;
      padding:10px 14px;
    }

    #adminBtn {
      position:absolute;
      bottom:10px;
      right:10px;
      width:40px;
      height:40px;
      opacity:0.05;
      z-index:10000;
    }
  </style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>

  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="hud">Waiting...</div>
  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div id="adminMap"></div>

  <div id="adminControls">
    <button onclick="startGame()">START</button>
    <button onclick="stopGame()">STOP</button>
    <button onclick="setDomination()">SET POINT</button>
    <button onclick="exitAdmin()">EXIT</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* PLAYER */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team = null;
let playerLat = null;
let playerLng = null;

/* ADMIN */
let isAdmin = false;

/* MAPS */
let map = null;
let adminMap = null;

/* DOMINATION */
let domMarker = null;
let tempPoint = null;
let dominationPoint = null;

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  setTimeout(()=>{
    if(map) map.invalidateSize();
    if(adminMap) adminMap.invalidateSize();
  },300);
}

/* MAP INIT */
function initMap(){
  if(map) return;
  map = L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
}

function initAdminMap(){
  if(adminMap) return;
  adminMap = L.map('adminMap').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(adminMap);

  adminMap.on("click", e=>{
    tempPoint = e.latlng;
    if(domMarker) domMarker.setLatLng(e.latlng);
    else domMarker = L.circleMarker(e.latlng,{radius:10,color:"yellow"}).addTo(adminMap);
  });
}

/* TEAM */
function selectTeam(t){ team = t; }

/* JOIN */
function joinGame(){
  const name = document.getElementById("name").value;
  if(!name || !team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  const ref = db.ref("players/"+playerId);

  navigator.geolocation.getCurrentPosition(pos=>{
    ref.set({
      name, team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });

    ref.onDisconnect().remove(); // 🔥 REMOVE GHOST PLAYER
  });
}

/* ADMIN LOGIN */
function adminLogin(){
  const code = prompt("Admin Code");
  if(code === "1288"){
    isAdmin = true;
    showScreen("adminScreen");
    initAdminMap();

    const ref = db.ref("admin");

    navigator.geolocation.watchPosition(pos=>{
      ref.set({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      });
    });

    ref.onDisconnect().remove(); // 🔥 REMOVE ADMIN GHOST
  }
}

/* ADMIN */
function setDomination(){
  if(!tempPoint) return alert("Tap map first");
  db.ref("dominationPoint").set(tempPoint);
}

function startGame(){
  db.ref("game").set({state:"live"});
  db.ref("scores").set({red:0,green:0});
}

function stopGame(){
  db.ref("game").set({state:"ended"});
}

function exitAdmin(){
  db.ref("admin").remove();
  showScreen("lobby");
}

/* GPS TRACK */
navigator.geolocation.watchPosition(pos=>{
  playerLat = pos.coords.latitude;
  playerLng = pos.coords.longitude;

  db.ref("players/"+playerId).update({
    lat:playerLat,
    lng:playerLng
  });

  if(map) map.setView([playerLat,playerLng]);
});

/* SCOREBOARD UI */
db.ref("scores").on("value", snap=>{
  const s = snap.val();
  if(!s) return;
  document.getElementById("scoreboardGame").innerText =
    `🔴 ${s.red} | 🟢 ${s.green}`;
});

/* DOMINATION POINT */
db.ref("dominationPoint").on("value", snap=>{
  dominationPoint = snap.val();
});

/* GAME LOOP SCORING */
setInterval(()=>{
  if(!dominationPoint) return;

  db.ref("players").once("value", snap=>{
    const players = snap.val();
    if(!players) return;

    let red=0, green=0;

    Object.values(players).forEach(p=>{
      if(!p.lat) return;

      const dist = Math.sqrt(
        Math.pow(p.lat - dominationPoint.lat,2) +
        Math.pow(p.lng - dominationPoint.lng,2)
      );

      if(dist < 0.0001){
        if(p.team==="red") red++;
        if(p.team==="green") green++;
      }
    });

    if(red === green) return;

    db.ref("scores").transaction(s=>{
      if(!s) s = {red:0,green:0};
      if(red > green) s.red += 1;
      else s.green += 1;
      return s;
    });

  });
},3000);

</script>

</body>
</html>
