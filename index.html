<!DOCTYPE html>
<html>
<head>
  <title>VAULT HUNT - MILSIM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:black;
      color:white;
    }

    #map { height:100vh; }

    /* 🎖️ MILITARY LOBBY */
    #lobby {
      position:fixed;
      inset:0;
      background:radial-gradient(circle, #1a1a1a, black);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    #lobby h1 {
      font-size:34px;
      letter-spacing:3px;
      color:#00ff9d;
      text-shadow:0 0 10px #00ff9d;
      margin-bottom:10px;
    }

    #lobby p {
      opacity:0.7;
      margin-bottom:20px;
    }

    input {
      padding:12px;
      font-size:16px;
      width:220px;
      margin-bottom:15px;
      text-align:center;
      border:none;
      border-radius:6px;
    }

    .btn {
      padding:14px 25px;
      margin:8px;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    .red { background:#ff2b2b; color:white; }
    .green { background:#00c853; color:white; }

    /* 🎯 HUD */
    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      padding:12px;
      border-radius:10px;
      z-index:1000;
      font-size:14px;
      min-width:200px;
      border:1px solid #333;
    }

    #warning {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      padding:10px 18px;
      border-radius:8px;
      display:none;
      z-index:1000;
      font-weight:bold;
    }

    /* 🟦 battlefield glow */
    .battlefield-label {
      color:#00d4ff;
      font-weight:bold;
      font-size:12px;
    }

  </style>
</head>

<body>

<!-- 🎖️ LOBBY -->
<div id="lobby">
  <h1>VAULT HUNT</h1>
  <p>TACTICAL GPS OPERATIONS</p>

  <input id="name" placeholder="CALLSIGN">

  <button class="btn red" onclick="join('red')">JOIN RED TEAM</button>
  <button class="btn green" onclick="join('green')">JOIN GREEN TEAM</button>
</div>

<!-- 🎯 HUD -->
<div id="hud">
  🔴 Red: <span id="redTime">0</span>s<br>
  🟢 Green: <span id="greenTime">0</span>s<br>
  💀 Red Deaths: <span id="redDeaths">0</span><br>
  💀 Green Deaths: <span id="greenDeaths">0</span>
</div>

<div id="warning">⚠ RETURN TO BATTLEFIELD</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔑 PLAYER ID
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team = null;
let playerName = "";

// 🗺️ MAP
const map = L.map('map').setView([-26.4103,152.9258],18);

// 🟩 BASE MAPS
const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

street.addTo(map);

L.control.layers({
  "Street": street,
  "Satellite": satellite
}).addTo(map);

// 🟦 BATTLEFIELD ZONE
const battlefield = [
  [-26.4106,152.9253],
  [-26.4102,152.9265],
  [-26.4097,152.9261],
  [-26.4098,152.9254]
];

const zone = L.polygon(battlefield,{
  color:"#00d4ff",
  weight:3,
  fillColor:"#00d4ff",
  fillOpacity:0.08
}).addTo(map);

// ✨ glow outline effect
L.polyline([...battlefield,battlefield[0]],{
  color:"#00d4ff",
  weight:1
}).addTo(map);

// 🧱 BARRICADES (TACTICAL OBJECTS)
const barricades = [
  [-26.4104,152.9259],
  [-26.4101,152.9256],
  [-26.4100,152.9260]
];

barricades.forEach(b=>{
  L.circleMarker(b,{
    radius:8,
    color:"orange",
    fillColor:"orange",
    fillOpacity:0.6
  }).addTo(map).bindPopup("🧱 Cover");
});

// 📏 DISTANCE
function dist(a,b){
  const R=6371e3;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// 🚀 JOIN GAME
function join(selectedTeam){

  playerName=document.getElementById("name").value;
  if(!playerName){alert("Enter callsign");return;}

  team=selectedTeam;
  document.getElementById("lobby").style.display="none";

  navigator.geolocation.watchPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    db.ref("players/"+playerId).set({
      lat,lng,team,name:playerName,lastSeen:Date.now()
    });

    map.setView([lat,lng]);

    // 🎯 CAPTURE ZONE LOGIC
    if(dist({lat,lng}, {lat:-26.4103,lng:152.9258}) < 3){
      db.ref("game/"+team+"Time").transaction(v=>(v||0)+1);
    }

  },err=>alert(err.message),{enableHighAccuracy:true});
}

// 📊 LIVE SCOREBOARD
db.ref("game").on("value",snap=>{
  const g=snap.val()||{};

  document.getElementById("redTime").innerText=g.redTime||0;
  document.getElementById("greenTime").innerText=g.greenTime||0;
  document.getElementById("redDeaths").innerText=g.redDeaths||0;
  document.getElementById("greenDeaths").innerText=g.greenDeaths||0;
});

</script>

</body>
</html>
