<!DOCTYPE html>
<html>
<head>
  <title>Battlefield Builder - STABLE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; }

    #lobby {
      position:fixed;
      inset:0;
      background:#0b0f14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:9999;
    }

    #adminPanel {
      position:absolute;
      bottom:10px;
      right:10px;
      background:black;
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:2000;
      display:none;
    }

    button {
      margin:5px;
      padding:8px;
      cursor:pointer;
    }

    .modeBtn { width:100%; }
  </style>
</head>

<body>

<div id="lobby">
  <h2>ENTER GAME</h2>
  <input id="name" placeholder="Name">
  <input id="adminCode" placeholder="Admin Code">
  <button onclick="enter()">ENTER</button>
</div>

<div id="adminPanel">
  <b>BUILD MODE</b><br>

  <button class="modeBtn" onclick="setMode('wall')">🧱 Wall</button>
  <button class="modeBtn" onclick="setMode('drum')">🛢 Drum</button>
  <button class="modeBtn" onclick="setMode('bridge')">🌉 Bridge</button>
  <button class="modeBtn" onclick="setMode('fence')">🚧 Fence</button>
  <button class="modeBtn" onclick="setMode('water')">🌊 Water</button>

  <hr>

  <button onclick="startDraw()">▶ Start</button>
  <button onclick="endDraw()">⏹ End</button>

  <hr>

  <button onclick="exitAdmin()">❌ Exit</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= MAP ================= */
const map = L.map('map', {
  center: [-26.4103,152.9258],
  zoom: 18,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* FIX MOBILE RENDER */
setTimeout(() => map.invalidateSize(), 500);

/* ================= PLAYER DOT (FIXED) ================= */
let playerMarker = null;

/* ================= ADMIN STATE ================= */
let isAdmin = false;
let mode = null;
let drawing = false;
let points = [];
let lastPoint = null;
const MIN_DISTANCE = 3;

/* ================= LOGIN ================= */
function enter(){
  const code = document.getElementById("adminCode").value;

  if(code === "1234"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
  }

  document.getElementById("lobby").style.display = "none";
}

/* ================= MODE ================= */
function setMode(m){
  mode = m;
  alert("Mode: " + m);
}

/* ================= DRAW START ================= */
function startDraw(){
  if(!mode){ alert("Select mode"); return; }
  drawing = true;
  points = [];
  lastPoint = null;
}

/* ================= DRAW END ================= */
function endDraw(){
  drawing = false;

  if(points.length < 2) return;

  const data = {
    type: mode,
    points: points
  };

  if(mode === "fence"){
    points.push(points[0]);
    db.ref("perimeter").set(data);
  } else {
    db.ref("objects").push(data);
  }

  points = [];
}

/* ================= EXIT ================= */
function exitAdmin(){
  document.getElementById("adminPanel").style.display = "none";
  isAdmin = false;
}

/* ================= DISTANCE ================= */
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* ================= GPS (FIXED DOT LOGIC) ================= */
navigator.geolocation.watchPosition(pos=>{

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  console.log("GPS:", lat, lng);

  /* CREATE DOT ONLY WHEN GPS EXISTS */
  if(!playerMarker){
    playerMarker = L.circleMarker([lat,lng],{
      radius:10,
      color:"yellow",
      fillColor:"yellow",
      fillOpacity:1
    }).addTo(map);

    map.setView([lat,lng],18);
  } else {
    playerMarker.setLatLng([lat,lng]);
  }

  /* DRAW MODE */
  if(drawing){

    if(!lastPoint){
      points.push([lat,lng]);
      lastPoint = {lat,lng};
    } else {

      const dist = getDistance(
        lastPoint.lat,
        lastPoint.lng,
        lat,
        lng
      );

      if(dist >= MIN_DISTANCE){
        points.push([lat,lng]);
        lastPoint = {lat,lng};
      }
    }
  }

}, err=>{
  alert("GPS ERROR: " + err.message);
}, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 10000
});

/* ================= RENDER OBJECTS ================= */
let layers = [];

db.ref("objects").on("value",snap=>{

  layers.forEach(l=>map.removeLayer(l));
  layers = [];

  const data = snap.val();
  if(!data) return;

  Object.values(data).forEach(obj=>{

    let color = "white";

    if(obj.type==="wall") color="orange";
    if(obj.type==="drum") color="blue";
    if(obj.type==="bridge") color="brown";
    if(obj.type==="water") color="cyan";

    const line = L.polyline(obj.points,{color,weight:4}).addTo(map);
    layers.push(line);

  });

});

/* ================= RENDER PERIMETER ================= */
let perimeterLayer = null;

db.ref("perimeter").on("value",snap=>{

  if(perimeterLayer) map.removeLayer(perimeterLayer);

  const data = snap.val();
  if(!data) return;

  perimeterLayer = L.polygon(data.points,{
    color:"red",
    fillColor:"red",
    fillOpacity:0.1,
    weight:3
  }).addTo(map);

});

</script>

</body>
</html>
