<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - FIXED BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#000; color:white; overflow:hidden; }

    .screen { position:fixed; inset:0; display:none; }

    #lobby {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      background:radial-gradient(circle,#111,#000); z-index:9999;
    }

    input {
      padding:12px; margin:10px; width:240px; text-align:center;
      background:#111; color:white; border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    #map, #adminMap { height:100%; width:100%; }

    #gameScreen { background:#000; }
    #adminScreen {
      background:#000; flex-direction:column; justify-content:center; align-items:center;
      z-index:10000;
    }

    #adminMap { width:90%; height:60%; margin-top:20px; }

    #hud {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,0.7); padding:10px; border-radius:8px;
      z-index:1000;
    }

    #adminBtn {
      position:absolute; bottom:10px; right:10px;
      width:40px; height:40px; opacity:0.05; z-index:10000;
    }

    #centerText {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:34px; z-index:9999;
    }
  </style>
</head>

<body>

<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">
  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>
  <button onclick="joinGame()">JOIN GAME</button>
  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="hud">Waiting...</div>
</div>

<div id="adminScreen" class="screen">
  <h2>ADMIN PANEL</h2>
  <button onclick="startGame()">START</button>
  <button onclick="stopGame()">STOP</button>
  <button onclick="exitAdmin()">EXIT</button>
  <div id="adminMap"></div>
</div>

<div id="centerText"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team = null;
let isAdmin = false;

/* ================= MAPS ================= */
let map = null;
let adminMap = null;

/* ================= SCREEN ================= */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="flex";
}

/* ================= MAP INIT ================= */
function initMap(){
  if(map) return;

  map = L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom:19 }
  ).addTo(map);

  addBattlefield(map);

  setTimeout(()=>map.invalidateSize(),300);
}

function initAdminMap(){
  if(adminMap) return;

  adminMap = L.map('adminMap').setView([-26.4103,152.9258],18);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom:19 }
  ).addTo(adminMap);

  addBattlefield(adminMap);

  setTimeout(()=>adminMap.invalidateSize(),300);
}

/* ================= BATTLEFIELD ================= */
function addBattlefield(targetMap){
  L.polygon([
    [-26.410576,152.925350],
    [-26.410366,152.926038],
    [-26.410319,152.926016],
    [-26.410285,152.926102],
    [-26.410297,152.926128],
    [-26.410200,152.926429],
    [-26.410081,152.926291],
    [-26.410020,152.926272],
    [-26.409833,152.926069],
    [-26.409810,152.926023],
    [-26.409807,152.925945],
    [-26.409696,152.925928],
    [-26.409707,152.925760],
    [-26.409786,152.925749],
    [-26.409809,152.925480],
    [-26.410572,152.925348]
  ],{
    color:"#00bfff",
    fillOpacity:0.4
  }).addTo(targetMap);
}

/* ================= JOIN ================= */
function joinGame(){
  const name = document.getElementById("name").value;
  if(!name || !team) return alert("Enter name + team");

  showScreen("gameScreen");

  setTimeout(()=>{
    initMap();
    map.invalidateSize();
  },200);

  const playerRef = db.ref("players/"+playerId);

  navigator.geolocation.getCurrentPosition(pos=>{
    playerRef.set({
      name, team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      lastSeen: Date.now()
    });

    // 🔥 REMOVE ON DISCONNECT
    playerRef.onDisconnect().remove();
  });

  // 🔥 HEARTBEAT
  setInterval(()=>{
    playerRef.update({ lastSeen: Date.now() });
  },5000);
}

/* ================= ADMIN ================= */
function adminLogin(){
  const code = prompt("Admin Code");
  if(code === "1288"){
    isAdmin = true;
    showScreen("adminScreen");
    initAdminMap();
  }
}

function startGame(){ db.ref("game").set({state:"live"}); }
function stopGame(){ db.ref("game").set({state:"ended"}); }
function exitAdmin(){ isAdmin=false; showScreen("lobby"); }

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{
  db.ref("players/"+playerId).update({
    lat:pos.coords.latitude,
    lng:pos.coords.longitude,
    lastSeen: Date.now()
  });
});

/* ================= CLEANUP (STALE PLAYERS) ================= */
setInterval(()=>{
  db.ref("players").once("value").then(snap=>{
    const data = snap.val();
    if(!data) return;

    Object.keys(data).forEach(id=>{
      const p = data[id];
      if(Date.now() - (p.lastSeen || 0) > 15000){
        db.ref("players/"+id).remove();
      }
    });
  });
},10000);

/* ================= RENDER ================= */
const markers = {};

db.ref("players").on("value", snap=>{
  const data = snap.val();
  if(!data) return;

  Object.keys(data).forEach(id=>{
    const p = data[id];
    if(!p.lat || !p.lng) return;

    const isSelf = (id === playerId);
    const isSameTeam = (p.team === team);

    if(!isAdmin && !isSelf && !isSameTeam){
      if(markers[id]){
        if(map) map.removeLayer(markers[id]);
        delete markers[id];
      }
      const aid = "a_"+id;
      if(markers[aid]){
        if(adminMap) adminMap.removeLayer(markers[aid]);
        delete markers[aid];
      }
      return;
    }

    const color = p.team === "red" ? "red" : "lime";

    const icon = L.divIcon({
      html:`<div style="
        width:14px;height:14px;
        background:${color};
        border-radius:50%;
        box-shadow:0 0 10px ${color};
      "></div>`
    });

    if(map){
      if(!markers[id]){
        markers[id] = L.marker([p.lat,p.lng],{icon}).addTo(map);
      } else {
        markers[id].setLatLng([p.lat,p.lng]);
        markers[id].setIcon(icon);
      }
    }

    if(adminMap){
      const aid = "a_"+id;
      if(!markers[aid]){
        markers[aid] = L.marker([p.lat,p.lng],{icon}).addTo(adminMap);
      } else {
        markers[aid].setLatLng([p.lat,p.lng]);
        markers[aid].setIcon(icon);
      }
    }

  });
});

</script>

</body>
</html>
