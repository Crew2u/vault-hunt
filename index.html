<!DOCTYPE html>
<html>
<head>
  <title>Vault Hunt - SPOTTED BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; }

    #lobby {
      position:fixed;
      inset:0;
      background:#0b0f14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:9999;
    }

    input {
      padding:10px;
      margin:10px;
      width:220px;
      text-align:center;
    }

    button {
      padding:12px 20px;
      margin:6px;
      cursor:pointer;
    }

    .red { background:#ff2b2b; color:white; border:none; }
    .green { background:#00c853; color:white; border:none; }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:1000;
    }

    #warning {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      display:none;
      z-index:1000;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.4; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

<div id="lobby">
  <h2 style="color:#00ff9d;">VAULT HUNT</h2>
  <input id="name" placeholder="Enter Name">
  <button class="red" onclick="join('red')">Join Red</button>
  <button class="green" onclick="join('green')">Join Green</button>
</div>

<div id="hud">
  🔴 Red: <span id="redTime">0</span><br>
  🟢 Green: <span id="greenTime">0</span>
</div>

<div id="warning">⚠ OUT OF BATTLEFIELD</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team = null;
let playerName = "";

/* ================= MOVEMENT TRACKING ================= */
let pLastLat;
let pLastLng;
let lastMoveTime = Date.now();

/* ================= MAP ================= */
const map = L.map('map').setView([-26.4103,152.9258],18);

setTimeout(()=>map.invalidateSize(),500);

const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
street.addTo(map);

/* ================= FIELD ================= */
const battlefieldCoords = [
  [-26.410576, 152.925350],
  [-26.410366, 152.926038],
  [-26.410319, 152.926016],
  [-26.410285, 152.926102],
  [-26.410297, 152.926128],
  [-26.410200, 152.926429],
  [-26.410081, 152.926291],
  [-26.410020, 152.926272],
  [-26.409833, 152.926069],
  [-26.409810, 152.926023],
  [-26.409807, 152.925945],
  [-26.409696, 152.925928],
  [-26.409707, 152.925760],
  [-26.409786, 152.925749],
  [-26.409809, 152.925480],
  [-26.410572, 152.925348]
];

L.polygon(battlefieldCoords,{
  color:"#00bfff",
  fillOpacity:0.12
}).addTo(map);

/* ================= CAMPING LOGIC ================= */
function updateMovement(lat,lng){

  if(pLastLat !== undefined){
    const d = map.distance([pLastLat,pLastLng],[lat,lng]);

    if(d > 5){
      lastMoveTime = Date.now();
    }
  }

  pLastLat = lat;
  pLastLng = lng;

  return (Date.now() - lastMoveTime) > 60000;
}

/* ================= JOIN ================= */
function join(selectedTeam){

  playerName=document.getElementById("name").value;
  if(!playerName){alert("Enter name");return;}

  team=selectedTeam;
  document.getElementById("lobby").style.display="none";

  navigator.geolocation.watchPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    const camped = updateMovement(lat,lng);

    db.ref("players/"+playerId).update({
      lat,
      lng,
      team,
      name:playerName,
      lastSeen:Date.now(),
      camped
    });

    document.getElementById("warning").style.display =
      isInside(lat,lng) ? "none" : "block";

  },err=>alert(err.message),{enableHighAccuracy:true});
}

/* ================= INSIDE CHECK ================= */
function isInside(lat,lng){
  let inside=false;
  for(let i=0,j=battlefieldCoords.length-1;i<battlefieldCoords.length;j=i++){
    const xi=battlefieldCoords[i][0], yi=battlefieldCoords[i][1];
    const xj=battlefieldCoords[j][0], yj=battlefieldCoords[j][1];

    const intersect =
      ((yi>lng)!=(yj>lng)) &&
      (lat < (xj-xi)*(lng-yi)/(yj-yi)+xi);

    if(intersect) inside=!inside;
  }
  return inside;
}

/* ================= RENDER SYSTEM ================= */
const markers={};

function icon(color,spotted){
  return L.divIcon({
    className:"",
    html:`
      <div style="
        width:12px;
        height:12px;
        border-radius:50%;
        background:${color};
        box-shadow:0 0 8px ${color};
        animation:${spotted ? "pulse 1s infinite" : "none"};
      "></div>
    `,
    iconSize:[12,12],
    iconAnchor:[6,6]
  });
}

db.ref("players").on("value",snap=>{

  const data=snap.val();
  if(!data) return;

  Object.keys(data).forEach(id=>{

    const p=data[id];
    if(!p.lat||!p.lng) return;

    const isEnemy = p.team !== team;

    let visible = true;

    if(isEnemy && !p.camped){
      visible = false;
    }

    if(!visible){
      if(markers[id]){
        map.removeLayer(markers[id]);
        delete markers[id];
      }
      return;
    }

    const color = p.team==="red" ? "red" : "lime";
    const spotted = isEnemy && p.camped;

    const markerIcon = icon(color,spotted);

    if(!markers[id]){
      markers[id]=L.marker([p.lat,p.lng],{icon:markerIcon}).addTo(map);
    } else {
      markers[id].setLatLng([p.lat,p.lng]);
      markers[id].setIcon(markerIcon);
    }

  });

});

</script>

</body>
</html>
