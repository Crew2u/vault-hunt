<!DOCTYPE html>
<html>
<head>
  <title>Vault Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:black; }

    #map { height:100vh; }

    /* 🎮 HUD OVERLAY */
    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      color:white;
      padding:12px;
      border-radius:10px;
      z-index:1000;
      font-size:14px;
      min-width:180px;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    /* ⚠ WARNING */
    #warning {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:white;
      padding:10px 20px;
      border-radius:8px;
      display:none;
      z-index:1000;
    }

    /* 🎯 LOBBY */
    #lobby {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:black;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:2000;
      color:white;
    }

    input {
      padding:10px;
      margin:10px;
      font-size:16px;
    }

    button {
      padding:12px 20px;
      margin:8px;
      font-size:16px;
    }

    .red { background:red; color:white; }
    .green { background:green; color:white; }

  </style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
  <h1>VAULT HUNT</h1>
  <input id="name" placeholder="Enter Name">
  <button class="red" onclick="join('red')">Join Red</button>
  <button class="green" onclick="join('green')">Join Green</button>
</div>

<!-- 📊 HUD -->
<div id="hud">
  🔴 Red: <span id="redTime">0</span>s | 💀 <span id="redDeaths">0</span><br>
  🟢 Green: <span id="greenTime">0</span>s | 💀 <span id="greenDeaths">0</span><br>
  <hr>
  🏆 <span id="leader">-</span>
</div>

<div id="warning">⚠ RETURN TO BATTLEFIELD</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔑 PLAYER ID
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team = null;
let playerName = "";

// 🗺️ MAP
const map = L.map('map').setView([-26.4103,152.9258],18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🧭 SAFE ZONE
const SAFE = {lat:-26.4103,lng:152.9258};

// 📏 DISTANCE
function dist(a,b){
  const R=6371e3;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// 🚀 JOIN
function join(selectedTeam){

  playerName=document.getElementById("name").value;
  if(!playerName){alert("Enter name");return;}

  team=selectedTeam;
  document.getElementById("lobby").style.display="none";

  navigator.geolocation.watchPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    db.ref("players/"+playerId).set({
      lat,lng,team,name:playerName,lastSeen:Date.now()
    });

    map.setView([lat,lng]);

    // 🎯 CAPTURE
    if(dist({lat,lng},SAFE)<3){
      db.ref("game/"+team+"Time").transaction(v=>(v||0)+1);
    }

  },err=>alert(err.message),{enableHighAccuracy:true});
}

// 📊 LIVE SCOREBOARD HUD
db.ref("game").on("value",snap=>{

  const g=snap.val()||{};

  const red=g.redTime||0;
  const green=g.greenTime||0;

  document.getElementById("redTime").innerText=red;
  document.getElementById("greenTime").innerText=green;
  document.getElementById("redDeaths").innerText=g.redDeaths||0;
  document.getElementById("greenDeaths").innerText=g.greenDeaths||0;

  // 🏆 LEADER
  let leader="-";
  if(red>green) leader="🔴 Red Leading";
  if(green>red) leader="🟢 Green Leading";

  const leadEl=document.getElementById("leader");
  leadEl.innerText=leader;

  if(red!==green){
    leadEl.classList.add("blink");
  } else {
    leadEl.classList.remove("blink");
  }

});

</script>

</body>
</html>
