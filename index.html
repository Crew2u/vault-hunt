<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - MASTER FINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; color:white; }
    #map { height:100vh; }

    /* ===== LOBBY ===== */
    #lobby {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      background:radial-gradient(circle,#0b0f14,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn {
      padding:14px 24px;
      margin:10px;
      border:none;
      cursor:pointer;
    }

    .selectedRed { background:red; box-shadow:0 0 20px red; }
    .selectedGreen { background:lime; box-shadow:0 0 20px lime; }

    #joinBtn { padding:14px 30px; margin-top:20px; }

    /* ===== WAITING SCREEN ===== */
    #waitingScreen {
      position:fixed;
      inset:0;
      display:none;
      z-index:5000;
    }

    #radar {
      position:absolute;
      top:50%;
      left:50%;
      width:260px;
      height:260px;
      border-radius:50%;
      border:2px solid rgba(0,255,200,0.4);
      transform:translate(-50%,-50%);
    }

    #waitingText {
      position:absolute;
      bottom:40px;
      width:100%;
      text-align:center;
    }

    /* ===== ADMIN ===== */
    #adminHidden {
      position:fixed;
      bottom:5px;
      right:5px;
      width:30px;
      height:30px;
      opacity:0.05;
      z-index:9999;
    }

    #adminPanel {
      position:fixed;
      bottom:10px;
      left:10px;
      background:rgba(0,0,0,0.8);
      padding:10px;
      border-radius:10px;
      display:none;
      z-index:9999;
    }

    #adminPanel button {
      display:block;
      margin:5px 0;
      width:140px;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:30px;
      z-index:9999;
    }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:10px;
      z-index:1000;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <div>
    <button id="redBtn" class="teamBtn" onclick="selectTeam('red')">RED</button>
    <button id="greenBtn" class="teamBtn" onclick="selectTeam('green')">GREEN</button>
  </div>

  <button id="joinBtn" onclick="joinGame()">JOIN GAME</button>
</div>

<div id="waitingScreen">
  <div id="map"></div>
  <div id="radar"></div>
  <div id="waitingText">WAITING FOR GAME START...</div>
</div>

<div id="adminHidden" onclick="adminLogin()"></div>

<div id="adminPanel">
  <button onclick="startGame()">START</button>
  <button onclick="pauseGame()">PAUSE</button>
  <button onclick="resumeGame()">RESUME</button>
  <button onclick="stopGame()">END</button>
  <button onclick="resetGame()">RESET</button>
</div>

<div id="hud">Waiting...</div>
<div id="centerText"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team=null;
let isAdmin=false;

/* ================= MAP ================= */
const map = L.map('map').setView([-26.4103,152.9258],18);
setTimeout(() => {
  map.invalidateSize();
}, 800);
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{opacity:0.6}).addTo(map);

/* ================= ORIGINAL FIELD ================= */
const battlefieldCoords = [
  [-26.410576,152.925350],
  [-26.410366,152.926038],
  [-26.410319,152.926016],
  [-26.410285,152.926102],
  [-26.410297,152.926128],
  [-26.410200,152.926429],
  [-26.410081,152.926291],
  [-26.410020,152.926272],
  [-26.409833,152.926069],
  [-26.409810,152.926023],
  [-26.409807,152.925945],
  [-26.409696,152.925928],
  [-26.409707,152.925760],
  [-26.409786,152.925749],
  [-26.409809,152.925480],
  [-26.410572,152.925348]
];

L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.1}).addTo(map);

/* ================= TEAM ================= */
function selectTeam(t){
  team=t;
  redBtn.classList.remove("selectedRed");
  greenBtn.classList.remove("selectedGreen");
  if(t==="red") redBtn.classList.add("selectedRed");
  else greenBtn.classList.add("selectedGreen");
}

/* ================= JOIN ================= */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team){alert("Enter name + team");return;}

  navigator.geolocation.getCurrentPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      camped:false,
      lastHit:0,
      lastSeen:Date.now()
    });
  });

  lobby.style.display="none";
waitingScreen.style.display="block";

setTimeout(()=>{
  map.invalidateSize();
  map.setView([-26.4103,152.9258],18);
  map._onResize(); // 🔥 forces internal redraw
}, 800);

/* ================= ADMIN ================= */
function adminLogin(){
  const code=prompt("Code");
  if(code==="1288"){
    isAdmin=true;
    adminPanel.style.display="block";
    showCenter("ADMIN MODE");
  }
}

function startGame(){
  db.ref("game").set({state:"countdown",countdownStart:Date.now()});
}
function pauseGame(){ db.ref("game").update({state:"paused"}); }
function resumeGame(){ db.ref("game").update({state:"live"}); }
function stopGame(){ db.ref("game").update({state:"ended"}); }
function resetGame(){
  db.ref("game").set({state:"lobby"});
  db.ref("scores").set({red:0,green:0});
}

/* ================= GAME STATE ================= */
db.ref("game").on("value",snap=>{
  const g=snap.val(); if(!g) return;

  if(g.state==="countdown"){
    const t=20-Math.floor((Date.now()-g.countdownStart)/1000);
    showCenter("STARTING "+t);
    if(t<=0){
      db.ref("game").update({state:"live",startTime:Date.now()});
    }
  }

  if(g.state==="live"){
    waitingScreen.style.display="none";
    showCenter("GAME ON");
  }

  if(g.state==="ended"){
    showCenter("GAME OVER");
  }
});

/* ================= TIMER ================= */
setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    const g=s.val();
    if(!g||g.state!=="live") return;

    const remain=600-Math.floor((Date.now()-g.startTime)/1000);
    hud.innerHTML="Time: "+remain;

    if(remain<=0){
      db.ref("game").update({state:"ended"});
    }
  });
},1000);

/* ================= CAMPING ================= */
let lastLat,lastLng,lastMove=Date.now();
function checkCamping(lat,lng){
  if(lastLat){
    if(map.distance([lastLat,lastLng],[lat,lng])>5){
      lastMove=Date.now();
    }
  }
  lastLat=lat; lastLng=lng;
  return (Date.now()-lastMove)>60000;
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;

  const camped=checkCamping(lat,lng);

  db.ref("players/"+playerId).update({
    lat,lng,camped,lastSeen:Date.now()
  });

  checkRespawn(lat,lng);
  checkDomination(lat,lng);

},{enableHighAccuracy:true});

/* ================= RENDER ================= */
const markers={};

db.ref("players").on("value",snap=>{
  const data=snap.val(); if(!data) return;

  Object.keys(data).forEach(id=>{
    const p=data[id];
    if(!p.lat) return;

    let visible = true;

    if(!visible){
      if(markers[id]) map.removeLayer(markers[id]);
      delete markers[id];
      return;
    }

    const icon=L.divIcon({
      html:`<div style="width:10px;height:10px;background:${p.team==="red"?"red":"lime"};border-radius:50%"></div>`
    });
map.invalidateSize();
   if(!markers[id]){
  markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
}
    } else {
      markers[id].setLatLng([p.lat,p.lng]);
    }
  });
});

/* ================= DOMINATION ================= */
let domCircle;

setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    if(!s.val()||s.val().state!=="live") return;

    const p=battlefieldCoords[Math.floor(Math.random()*battlefieldCoords.length)];

    db.ref("domination").set({
      lat:p[0],lng:p[1],controlling:null
    });
  });
},180000);

db.ref("domination").on("value",snap=>{
  const d=snap.val(); if(!d) return;

  if(domCircle) map.removeLayer(domCircle);

  domCircle=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(map);
});

function checkDomination(lat,lng){
  db.ref("domination").once("value").then(s=>{
    const d=s.val(); if(!d) return;

    if(map.distance([lat,lng],[d.lat,d.lng])<3){
      db.ref("domination").update({controlling:team});
    }
  });
}

setInterval(()=>{
  db.ref("domination").once("value").then(s=>{
    const d=s.val();
    if(!d||!d.controlling) return;

    db.ref("scores/"+d.controlling).transaction(v=>(v||0)+1);
  });
},1000);

/* ================= RESPAWN ================= */
function checkRespawn(lat,lng){
  const respawns={
    red:[-26.41025,152.92575],
    green:[-26.41010,152.92600]
  };

  const r=respawns[team];
  if(!r) return;

  if(map.distance([lat,lng],r)<3){
    db.ref("players/"+playerId).once("value").then(s=>{
      const p=s.val();
      if(!p.lastHit || Date.now()-p.lastHit>20000){
        db.ref("players/"+playerId).update({lastHit:Date.now()});
        navigator.vibrate(200);
      }
    });
  }
}

/* ================= UI ================= */
function showCenter(text){
  centerText.innerText=text;
  centerText.style.display="block";
  setTimeout(()=>centerText.style.display="none",2000);
}

</script>

</body>
</html>
