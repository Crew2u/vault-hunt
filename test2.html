<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - PLAYER FIXED BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    .screen {
      position:fixed;
      inset:0;
      display:none;
    }

    #lobby {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    button {
      padding:10px 14px;
      margin:6px;
    }

    .teamBtn {
      padding:14px 24px;
      margin:8px;
    }

    #map, #adminMap {
      width:100%;
      height:100%;
    }

    #scoreboardGame, #scoreboardAdmin, #timer {
      position:absolute;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #scoreboardGame, #scoreboardAdmin {
      top:10px;
      left:10px;
    }

    #timer {
      top:10px;
      left:50%;
      transform:translateX(-50%);
    }
  </style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>

  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>
  <div onclick="adminLogin()">ADMIN</div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div id="adminMap"></div>
  <div id="scoreboardAdmin">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey:"AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain:"vault-hunt.firebaseapp.com",
  databaseURL:"https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();

/* GLOBALS */
let map=null;
let adminMap=null;

let playerId=localStorage.getItem("playerId")||Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team=null;

/* 🔥 CRITICAL FIX: SAFE MARKER STORAGE */
const gameMarkers={};
const adminMarkers={};

let mapReady=false;
let adminReady=false;

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="flex";

  setTimeout(()=>{
    if(map) map.invalidateSize();
    if(adminMap) adminMap.invalidateSize();
  },300);
}

/* MAP */
function initMap(){
  if(map) return;

  map=L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(map);

  mapReady=true;

  // 🔥 re-render players if data already loaded
  db.ref("players").once("value",snap=>{
    renderPlayers(snap.val()||{});
  });
}

/* ADMIN MAP */
function initAdminMap(){
  if(adminMap) return;

  adminMap=L.map('adminMap').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(adminMap);

  adminReady=true;

  db.ref("players").once("value",snap=>{
    renderPlayers(snap.val()||{});
  });
}

/* TEAM */
function selectTeam(t){ team=t; }

/* JOIN */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  navigator.geolocation.watchPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,
      team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  },{
    enableHighAccuracy:true
  });
}

/* ADMIN */
function adminLogin(){
  const code=prompt("Admin Code");
  if(code==="1288"){
    showScreen("adminScreen");
    initAdminMap();
  }
}

/* PLAYER RENDER CORE (FIXED) */
function renderPlayers(data){

  if(!data) return;

  Object.keys(data).forEach(id=>{
    const p=data[id];
    if(!p.lat) return;

    const icon=L.divIcon({
      html:`<div style="width:14px;height:14px;background:${p.team==="red"?"red":"lime"};border-radius:50%;box-shadow:0 0 10px ${p.team==="red"?"red":"lime"};"></div>`
    });

    /* GAME MAP SAFE ADD */
    if(mapReady && map){
      if(!gameMarkers[id]){
        gameMarkers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
      } else {
        gameMarkers[id].setLatLng([p.lat,p.lng]);
      }
    }

    /* ADMIN MAP SAFE ADD */
    if(adminReady && adminMap){
      if(!adminMarkers[id]){
        adminMarkers[id]=L.marker([p.lat,p.lng],{icon}).addTo(adminMap);
      } else {
        adminMarkers[id].setLatLng([p.lat,p.lng]);
      }
    }
  });
}

/* LIVE LISTENER */
db.ref("players").on("value",snap=>{
  renderPlayers(snap.val()||{});
});

</script>

</body>
</html>
