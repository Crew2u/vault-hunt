<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - STABLE RESTORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    .screen {
      position:fixed;
      inset:0;
      display:none;
    }

    #lobby {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    #map, #adminMap {
      width:100%;
      height:100%;
    }

    #scoreboardGame {
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #timer {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #adminControls {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:2000;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
      text-align:center;
    }

    #overlay {
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.85);
      z-index:9999;
      font-size:60px;
      font-weight:bold;
    }

    #adminBtn {
      position:absolute;
      bottom:10px;
      right:10px;
      width:40px;
      height:40px;
      opacity:0.05;
      z-index:10000;
    }
  </style>
</head>

<body>

<div id="overlay"></div>

<!-- LOBBY (UNCHANGED STRUCTURE) -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>

  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div id="adminMap"></div>

  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>

  <div id="adminControls">
    <button onclick="startGame()">START</button>
    <button onclick="stopGame()">STOP</button>
    <button onclick="setDomination()">SET POINT</button>
    <button onclick="exitAdmin()">EXIT</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey:"AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain:"vault-hunt.firebaseapp.com",
  databaseURL:"https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();

/* STATE (UNCHANGED CORE) */
let map=null;
let adminMap=null;
let team=null;

let playerId=localStorage.getItem("playerId")||Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let markers={};
let tempPoint=null;
let previewMarker=null;
let lastDominationPoint=null;

let scoreTick={red:0,green:0};

/* DISTANCE */
function getDistanceMeters(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;

  const a=Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)**2;

  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* SCREEN (UNCHANGED) */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  setTimeout(()=>{
    if(map) map.invalidateSize();
    if(adminMap) adminMap.invalidateSize();
  },300);
}

/* MAPS (UNCHANGED) */
function initMap(){
  if(map) return;

  map=L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(map);

  L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.4}).addTo(map);
}

function initAdminMap(){
  if(adminMap) return;

  adminMap=L.map('adminMap').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(adminMap);

  L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.4}).addTo(adminMap);

  adminMap.on("click",e=>{
    tempPoint=e.latlng;

    if(previewMarker){
      previewMarker.setLatLng(e.latlng);
    } else {
      previewMarker=L.circleMarker(e.latlng,{radius:10,color:"yellow"}).addTo(adminMap);
    }
  });
}

/* TEAM */
function selectTeam(t){ team=t; }

/* JOIN */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  navigator.geolocation.watchPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  });
}

/* 🔥 ADMIN LOGIN (RESTORED PROPERLY) */
function adminLogin(){
  const code = prompt("Admin Code");
  if(code === "1288"){
    showScreen("adminScreen");
    initAdminMap();
  }
}

function exitAdmin(){
  showScreen("lobby");
}

/* CAPTURE */
function setDomination(){
  if(!tempPoint) return alert("Tap map first");
  db.ref("dominationPoint").set(tempPoint);
}

/* CAPTURE SYNC */
db.ref("dominationPoint").on("value",snap=>{
  const d=snap.val();
  if(!d) return;

  lastDominationPoint=d;

  if(map){
    if(!domRenderGame)
      domRenderGame=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(map);
    else domRenderGame.setLatLng([d.lat,d.lng]);
  }

  if(adminMap){
    if(!domRenderAdmin)
      domRenderAdmin=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(adminMap);
    else domRenderAdmin.setLatLng([d.lat,d.lng]);
  }
});

/* PLAYERS + SCORING ADD-ON ONLY */
db.ref("players").on("value",snap=>{
  const data=snap.val();
  if(!data) return;

  scoreTick={red:0,green:0};

  Object.keys(data).forEach(id=>{
    const p=data[id];
    if(!p||!p.lat||!p.lng) return;

    const color=p.team==="red"?"red":"lime";

    const icon=L.divIcon({
      html:`<div style="width:14px;height:14px;background:${color};border-radius:50%;box-shadow:0 0 10px ${color};"></div>`
    });

    if(map){
      if(!markers[id])
        markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
      else markers[id].setLatLng([p.lat,p.lng]);
    }

    if(adminMap){
      const aid="a_"+id;
      if(!markers[aid])
        markers[aid]=L.marker([p.lat,p.lng],{icon}).addTo(adminMap);
      else markers[aid].setLatLng([p.lat,p.lng]);
    }

    if(lastDominationPoint){
      const d=getDistanceMeters(
        p.lat,p.lng,
        lastDominationPoint.lat,
        lastDominationPoint.lng
      );

      if(d<=3){
        if(p.team==="red") scoreTick.red++;
        if(p.team==="green") scoreTick.green++;
      }
    }
  });

  db.ref("scores").set(scoreTick);

  document.querySelectorAll("#scoreboardGame").forEach(el=>{
    el.innerText=`🔴 ${scoreTick.red} | 🟢 ${scoreTick.green}`;
  });
});

</script>

</body>
</html>
