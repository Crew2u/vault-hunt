<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - FULL SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#000; color:white; overflow:hidden; }
    .screen { position:fixed; inset:0; display:none; }

    #lobby {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      background:radial-gradient(circle,#111,#000); z-index:9999;
    }

    input { padding:12px; margin:10px; width:240px; text-align:center; background:#111; color:white; border:1px solid #333; }
    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    #map, #adminMap { width:100%; height:100%; }

    #hud, #scoreboardGame, #scoreboardAdmin, #timer {
      position:absolute; background:rgba(0,0,0,0.7); padding:10px;
      border-radius:8px; z-index:1000;
    }

    #hud { top:10px; right:10px; }
    #scoreboardGame, #scoreboardAdmin { top:10px; left:10px; font-size:18px; }
    #timer { top:10px; left:50%; transform:translateX(-50%); font-size:20px; }

    #adminControls {
      position:absolute; top:60px; left:50%; transform:translateX(-50%);
      z-index:2000; background:rgba(0,0,0,0.85);
      padding:12px; border-radius:10px; text-align:center;
    }

    #adminControls button { margin:5px; padding:10px 14px; }

    #adminBtn {
      position:absolute; bottom:10px; right:10px;
      width:40px; height:40px; opacity:0.05; z-index:10000;
    }

    #startOverlay {
      position:fixed; inset:0;
      display:none; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.85);
      z-index:99999;
      font-size:60px; font-weight:bold;
      color:#00ffcc;
    }
  </style>
</head>

<body>

<div id="startOverlay">GAME STARTED</div>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">
  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>
  <button onclick="joinGame()">JOIN GAME</button>
  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="hud">Waiting...</div>
  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div id="adminMap"></div>
  <div id="scoreboardAdmin">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>

  <div id="adminControls">
    <button onclick="startGame()">START</button>
    <button onclick="stopGame()">STOP</button>
    <button onclick="setDomination()">SET POINT</button>
    <button onclick="exitAdmin()">EXIT</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* GLOBALS */
let map, adminMap;
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team=null, playerLat=null, playerLng=null;

let dominationPoint=null;
let domCircleGame=null, domCircleAdmin=null;

let tempPoint=null, previewMarker=null;

const playerMarkers = {};
const adminMarkers = {};

const ZONE_RADIUS = 3;

/* BATTLEFIELD */
const battlefieldCoords = [
[-26.410576,152.925350],[-26.410366,152.926038],[-26.410319,152.926016],
[-26.410285,152.926102],[-26.410297,152.926128],[-26.410200,152.926429],
[-26.410081,152.926291],[-26.410020,152.926272],[-26.409833,152.926069],
[-26.409810,152.926023],[-26.409807,152.925945],[-26.409696,152.925928],
[-26.409707,152.925760],[-26.409786,152.925749],[-26.409809,152.925480],
[-26.410572,152.925348]
];

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  setTimeout(()=>{ if(map) map.invalidateSize(); if(adminMap) adminMap.invalidateSize(); },300);
}

/* MAP INIT */
function initMap(){
  if(map) return;
  map=L.map('map').setView([-26.4103,152.9258],18);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
  L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.4}).addTo(map);

  /* 🔥 CRITICAL FIX: ALWAYS LOAD EXISTING DOMINATION POINT */
  db.ref("dominationPoint").once("value",snap=>{
    const d=snap.val();
    if(d) renderDomination(d);
  });
}

/* ADMIN MAP */
function initAdminMap(){
  if(adminMap) return;
  adminMap=L.map('adminMap').setView([-26.4103,152.9258],18);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(adminMap);
  L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.4}).addTo(adminMap);

  adminMap.on("click",e=>{
    tempPoint=e.latlng;
    if(previewMarker) previewMarker.setLatLng(e.latlng);
    else previewMarker=L.circleMarker(e.latlng,{radius:10,color:"yellow"}).addTo(adminMap);
  });
}

/* TEAM */
function selectTeam(t){ team=t; }

/* JOIN */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  const ref=db.ref("players/"+playerId);

  navigator.geolocation.getCurrentPosition(pos=>{
    ref.set({name,team,lat:pos.coords.latitude,lng:pos.coords.longitude});
    ref.onDisconnect().remove();
  });
}

/* ADMIN */
function adminLogin(){
  const code=prompt("Admin Code");
  if(code==="1288"){
    showScreen("adminScreen");
    initAdminMap();
  }
}

function setDomination(){
  if(!tempPoint) return alert("Tap map first");
  db.ref("dominationPoint").set(tempPoint);
}

/* 🔥 FIXED: separate render function */
function renderDomination(d){
  dominationPoint=d;

  if(map){
    if(!domCircleGame) domCircleGame=L.circle([d.lat,d.lng],{radius:ZONE_RADIUS,color:"yellow"}).addTo(map);
    else domCircleGame.setLatLng([d.lat,d.lng]);
  }

  if(adminMap){
    if(!domCircleAdmin) domCircleAdmin=L.circle([d.lat,d.lng],{radius:ZONE_RADIUS,color:"yellow"}).addTo(adminMap);
    else domCircleAdmin.setLatLng([d.lat,d.lng]);
  }
}

/* 🔥 LIVE LISTENER (players always update) */
db.ref("dominationPoint").on("value",snap=>{
  const d=snap.val();
  if(d) renderDomination(d);
});

/* SCOREBOARD */
db.ref("scores").on("value",snap=>{
  const s=snap.val(); if(!s) return;
  const text=`🔴 ${s.red} | 🟢 ${s.green}`;
  document.querySelectorAll("#scoreboardGame,#scoreboardAdmin").forEach(el=>el.innerText=text);
});

/* TIMER + OVERLAY */
let timerInterval=null;

db.ref("game").on("value",snap=>{
  const g=snap.val(); if(!g) return;

  if(g.state==="live"){
    showOverlay();

    const end=g.startTime+15*60*1000;

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      let rem=Math.max(0,end-Date.now());
      let m=Math.floor(rem/60000);
      let s=Math.floor((rem%60000)/1000);

      const text=`${m}:${s.toString().padStart(2,'0')}`;
      document.querySelectorAll("#timer").forEach(t=>t.innerText=text);

      if(rem<=0){
        clearInterval(timerInterval);
        db.ref("game").set({state:"ended"});
      }
    },1000);
  }
});

function showOverlay(){
  const el=document.getElementById("startOverlay");
  el.style.display="flex";
  setTimeout(()=>el.style.display="none",5000);
}

/* SCORING */
function getDistance(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const lat1=a.lat*Math.PI/180;
  const lat2=b.lat*Math.PI/180;

  const x=Math.sin(dLat/2)**2+
          Math.sin(dLng/2)**2*Math.cos(lat1)*Math.cos(lat2);

  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

setInterval(()=>{
  if(!dominationPoint) return;

  db.ref("players").once("value",snap=>{
    const players=snap.val(); if(!players) return;

    let red=0,green=0;

    Object.values(players).forEach(p=>{
      if(!p.lat) return;

      const dist=getDistance({lat:p.lat,lng:p.lng},dominationPoint);

      if(dist <= ZONE_RADIUS){
        if(p.team==="red") red++;
        if(p.team==="green") green++;
      }
    });

    if(red===green) return;

    db.ref("scores").transaction(s=>{
      if(!s) s={red:0,green:0};
      if(red>green) s.red++;
      else s.green++;
      return s;
    });

  });
},3000);

</script>

</body>
</html>
