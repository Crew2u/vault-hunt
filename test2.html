<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - STABLE BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; color:white; }
    #map { height:100vh; width:100%; }

    #lobby {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      background:radial-gradient(circle,#0b0f14,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
    }

    .teamBtn { padding:14px 24px; margin:10px; }

    #waitingScreen {
      position:fixed;
      inset:0;
      display:none;
      z-index:5000;
    }

    #adminPanel {
      position:fixed;
      bottom:10px;
      left:10px;
      background:rgba(0,0,0,0.8);
      padding:10px;
      display:none;
      z-index:9999;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:28px;
      z-index:9999;
    }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      z-index:1000;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>
</div>

<div id="waitingScreen">
  <div id="map"></div>
</div>

<div id="adminPanel">
  <button onclick="startGame()">START</button>
  <button onclick="stopGame()">END</button>
</div>

<div id="hud">Waiting...</div>
<div id="centerText"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team=null;

/* ================= MAP (SAFE INIT) ================= */
let map;

function initMap(){
  if(map) return;

  map = L.map('map', {
    zoomControl:true
  }).setView([-26.4103,152.9258],18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    opacity:0.7
  }).addTo(map);

  L.polygon([
    [-26.410576,152.925350],
    [-26.410366,152.926038],
    [-26.410319,152.926016],
    [-26.410285,152.926102],
    [-26.410297,152.926128],
    [-26.410200,152.926429],
    [-26.410081,152.926291],
    [-26.410020,152.926272],
    [-26.409833,152.926069],
    [-26.409810,152.926023],
    [-26.409807,152.925945],
    [-26.409696,152.925928],
    [-26.409707,152.925760],
    [-26.409786,152.925749],
    [-26.409809,152.925480],
    [-26.410572,152.925348]
  ], {color:"#00bfff",fillOpacity:0.1}).addTo(map);

  setTimeout(()=>map.invalidateSize(),500);
}

/* ================= TEAM ================= */
function selectTeam(t){ team=t; }

/* ================= JOIN ================= */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team) return alert("Enter name + team");

  document.getElementById("lobby").style.display="none";
  document.getElementById("waitingScreen").style.display="block";

  initMap(); // 🔥 IMPORTANT

  navigator.geolocation.getCurrentPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  });
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{
  db.ref("players/"+playerId).update({
    lat:pos.coords.latitude,
    lng:pos.coords.longitude
  });
});

/* ================= SAFE RENDER ENGINE ================= */
const markers={};

db.ref("players").on("value",snap=>{
  const data=snap.val();
  if(!data || !map) return;

  Object.keys(data).forEach(id=>{
    const p=data[id];
    if (p.lat == null || p.lng == null) return;
const team = p.team || "unknown";
    try {

     const team = p.team || "unknown";

const color =
  team === "red" ? "red" :
  team === "green" ? "lime" :
  "white";

const icon = L.divIcon({
  html:`<div style="
    width:12px;height:12px;
    background:${color};
    border-radius:50%;
    box-shadow:0 0 10px ${color};
  "></div>`
});

      if(!markers[id]){
        markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
      } else {
        markers[id].setLatLng([p.lat,p.lng]);
      }

    } catch(e){
      console.log("marker error ignored",e);
    }

  });
});

/* ================= ADMIN ================= */
function startGame(){
  db.ref("game").set({state:"live"});
}
function stopGame(){
  db.ref("game").set({state:"ended"});
}

</script>

</body>
</html>
