<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - MASTER CONTROL BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; }
    #map { height:100vh; }

    #lobby {
      position:fixed;
      inset:0;
      background:#0b0f14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:9999;
    }

    input {
      padding:10px;
      margin:10px;
      width:220px;
      text-align:center;
    }

    button {
      padding:12px 20px;
      margin:6px;
      cursor:pointer;
    }

    .red { background:#ff2b2b; color:white; border:none; }
    .green { background:#00c853; color:white; border:none; }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:1000;
      font-size:14px;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      color:white;
      font-size:32px;
      z-index:9999;
      text-align:center;
      white-space:pre-line;
    }

    #adminPanel {
      position:fixed;
      bottom:10px;
      left:10px;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:99999;
      display:none;
      width:180px;
    }

    #adminPanel button {
      width:100%;
      margin:4px 0;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h2 style="color:#00ff9d;">DOMINATION GELBALL</h2>

  <input id="name" placeholder="Callsign">

  <div>
    <button class="red" onclick="selectTeam('red')">Red</button>
    <button class="green" onclick="selectTeam('green')">Green</button>
  </div>

  <button onclick="joinGame()">JOIN GAME</button>
  <button onclick="adminLogin()">ADMIN LOGIN</button>

  <div id="waiting" style="display:none;">Waiting for game start...</div>
</div>

<div id="hud">Waiting...</div>
<div id="centerText"></div>
<div id="map"></div>

<!-- ADMIN PANEL ALWAYS AVAILABLE -->
<div id="adminPanel">
  <b>ADMIN</b>

  <button onclick="startGame()">Start</button>
  <button onclick="pauseGame()">Pause</button>
  <button onclick="resumeGame()">Resume</button>
  <button onclick="stopGame()">Stop</button>
  <button onclick="resetGame()">Reset</button>
  <button onclick="spawnDomination()">Spawn</button>
  <button style="background:red;color:white;" onclick="emergencyStop()">EMERGENCY</button>

  <div id="adminStats"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* init scores */
db.ref("scores").once("value").then(s=>{
  if(!s.exists()) db.ref("scores").set({red:0,green:0});
});

/* ================= ADMIN ================= */
let isAdmin = false;

function adminLogin(){
  const pass = prompt("Admin password");
  if(pass==="vaultadmin"){
    isAdmin=true;
    document.getElementById("adminPanel").style.display="block";
    showCenter("ADMIN MODE ENABLED");
  }
}

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team=null;
let selectedTeam=null;

/* ================= MAP ================= */
const map = L.map('map').setView([-26.4103,152.9258],18);

L.tileLayer(
  'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
  {opacity:0.6}
).addTo(map);

/* ================= ORIGINAL FIELD (RESTORED) ================= */
const battlefieldCoords = [
  [-26.410576, 152.925350],
  [-26.410366, 152.926038],
  [-26.410319, 152.926016],
  [-26.410285, 152.926102],
  [-26.410297, 152.926128],
  [-26.410200, 152.926429],
  [-26.410081, 152.926291],
  [-26.410020, 152.926272],
  [-26.409833, 152.926069],
  [-26.409810, 152.926023],
  [-26.409807, 152.925945],
  [-26.409696, 152.925928],
  [-26.409707, 152.925760],
  [-26.409786, 152.925749],
  [-26.409809, 152.925480],
  [-26.410572, 152.925348]
];

L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.1}).addTo(map);

/* ================= RESPAWNS ================= */
const respawns={
  red:[-26.41025,152.92575],
  green:[-26.41010,152.92600]
};

Object.values(respawns).forEach(r=>{
  L.circle(r,{radius:5,color:"white"}).addTo(map);
});

/* ================= LOBBY ================= */
function selectTeam(t){selectedTeam=t;}

function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!selectedTeam){alert("Missing");return;}

  team=selectedTeam;

  navigator.geolocation.getCurrentPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,
      team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      camped:false,
      lastHit:0,
      lastSeen:Date.now()
    });
  });

  document.getElementById("waiting").style.display="block";
}

/* ================= GAME CONTROL ================= */
function startGame(){
  db.ref("game").set({state:"countdown",countdownStart:Date.now()});
}

function pauseGame(){
  db.ref("game").update({state:"paused"});
  showCenter("PAUSED");
}

function resumeGame(){
  db.ref("game").update({state:"live"});
}

function stopGame(){
  db.ref("game").update({state:"ended",winner:"none"});
}

function resetGame(){
  db.ref("game").set({state:"lobby"});
  db.ref("scores").set({red:0,green:0});
  db.ref("domination").remove();
  showCenter("RESET");
}

function emergencyStop(){
  db.ref("game").update({state:"ended",winner:"none"});
  navigator.vibrate([800,200,800]);
}

/* ================= GAME STATE ================= */
db.ref("game").on("value",snap=>{
  const g=snap.val();
  if(!g)return;

  if(g.state==="countdown"){
    const t=20-Math.floor((Date.now()-g.countdownStart)/1000);
    showCenter("STARTING "+t);

    if(t<=0){
      db.ref("game").update({state:"live",startTime:Date.now()});
    }
  }

  if(g.state==="live"){
    document.getElementById("lobby").style.display="none";
    showCenter("GAME ON");
  }

  if(g.state==="paused"){
    showCenter("PAUSED");
  }

  if(g.state==="ended"){
    showCenter("GAME OVER");
  }
});

/* ================= TIMER ================= */
setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    const g=s.val();
    if(!g||g.state!=="live")return;

    const remain=600-Math.floor((Date.now()-g.startTime)/1000);

    document.getElementById("hud").innerHTML=
      "Time:"+remain+(isAdmin?"<br>ADMIN":"");

    if(remain<=0){
      db.ref("game").update({state:"ended"});
    }
  });
},1000);

/* ================= CAMPING ================= */
let lastLat,lastLng,lastMove=Date.now();

function checkCamping(lat,lng){
  if(lastLat){
    if(map.distance([lastLat,lastLng],[lat,lng])>5){
      lastMove=Date.now();
    }
  }
  lastLat=lat;lastLng=lng;
  return(Date.now()-lastMove>60000);
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;

  const camped=checkCamping(lat,lng);

  db.ref("players/"+playerId).update({
    lat,lng,camped,lastSeen:Date.now()
  });

  checkRespawn(lat,lng);
  checkDomination(lat,lng);

},{enableHighAccuracy:true});

/* ================= RENDER ================= */
const markers={};

db.ref("players").on("value",snap=>{
  const d=snap.val();if(!d)return;

  Object.keys(d).forEach(id=>{
    const p=d[id];
    if(!p.lat)return;

    let visible=true;
    if(p.team!==team&&!p.camped)visible=false;

    if(!visible){
      if(markers[id])map.removeLayer(markers[id]);
      delete markers[id];
      return;
    }

    const icon=L.divIcon({
      html:`<div style="width:10px;height:10px;background:${p.team==="red"?"red":"lime"};border-radius:50%"></div>`
    });

    if(!markers[id]){
      markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
    }else{
      markers[id].setLatLng([p.lat,p.lng]);
    }
  });
});

/* ================= DOMINATION ================= */
setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    if(s.val().state!=="live")return;

    const p=battlefieldCoords[Math.floor(Math.random()*battlefieldCoords.length)];

    db.ref("domination").set({lat:p[0],lng:p[1],controlling:null});
  });
},180000);

db.ref("domination").on("value",snap=>{
  const d=snap.val();
  if(!d)return;
  L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(map);
});

function checkDomination(lat,lng){
  db.ref("domination").once("value").then(s=>{
    const d=s.val();
    if(!d)return;
    if(map.distance([lat,lng],[d.lat,d.lng])<3){
      db.ref("domination").update({controlling:team});
    }
  });
}

setInterval(()=>{
  db.ref("domination").once("value").then(s=>{
    const d=s.val();
    if(!d||!d.controlling)return;
    db.ref("scores/"+d.controlling).transaction(v=>(v||0)+1);
  });
},1000);

/* ================= RESPAWN ================= */
function checkRespawn(lat,lng){
  const r=respawns[team];
  if(!r)return;

  if(map.distance([lat,lng],r)<3){
    db.ref("players/"+playerId).once("value").then(s=>{
      const p=s.val();
      if(Date.now()-p.lastHit>20000){
        db.ref("players/"+playerId).update({lastHit:Date.now()});
        navigator.vibrate(200);
      }
    });
  }
}

/* ================= UI ================= */
function showCenter(t){
  const el=document.getElementById("centerText");
  el.innerText=t;
  el.style.display="block";
  setTimeout(()=>el.style.display="none",2000);
}

</script>

</body>
</html>
