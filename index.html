<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - MASTER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; }
    #map { height:100vh; }

    #lobby {
      position:fixed;
      inset:0;
      background:#0b0f14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:9999;
    }

    input {
      padding:10px;
      margin:10px;
      width:220px;
      text-align:center;
    }

    button {
      padding:12px 20px;
      margin:6px;
      cursor:pointer;
    }

    .red { background:#ff2b2b; color:white; border:none; }
    .green { background:#00c853; color:white; border:none; }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:1000;
      font-size:14px;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      color:white;
      font-size:32px;
      z-index:9999;
      text-align:center;
      white-space:pre-line;
    }

    #adminPanel {
      position:fixed;
      bottom:10px;
      left:10px;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:99999;
      display:none;
    }

    #adminPanel button {
      display:block;
      width:100%;
      margin:4px 0;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h2 style="color:#00ff9d;">DOMINATION GELBALL</h2>

  <input id="name" placeholder="Callsign">

  <div>
    <button class="red" onclick="selectTeam('red')">Red</button>
    <button class="green" onclick="selectTeam('green')">Green</button>
  </div>

  <button onclick="joinGame()">JOIN GAME</button>
  <button onclick="adminLogin()">ADMIN LOGIN</button>

  <div id="waiting" style="display:none;">Waiting for game start...</div>
</div>

<div id="hud">Waiting...</div>
<div id="centerText"></div>
<div id="map"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>ADMIN</h3>
  <button onclick="startGame()">Start Game</button>
  <button onclick="stopGame()">Stop Game</button>
  <button onclick="resetGame()">Reset</button>
  <button onclick="spawnDomination()">Spawn Domination</button>
  <div id="adminStats"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* INIT SCORES */
db.ref("scores").once("value").then(s=>{
  if(!s.exists()) db.ref("scores").set({red:0,green:0});
});

/* ================= ADMIN ================= */
let isAdmin = false;

function adminLogin(){
  const pass = prompt("Enter admin password");

  if(pass === "vaultadmin"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    alert("ADMIN MODE ON");
  } else {
    alert("Wrong password");
  }
}

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team = null;
let selectedTeam = null;

/* ================= MAP ================= */
const map = L.map('map').setView([-26.4103,152.9258],18);

L.tileLayer(
  'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
  { opacity:0.6 }
).addTo(map);

/* ================= FIELD ================= */
const battlefieldCoords = [
  [-26.410576, 152.925350],
  [-26.410366, 152.926038],
  [-26.410200, 152.926429],
  [-26.409833, 152.926069],
  [-26.409696, 152.925928],
  [-26.409809, 152.925480],
  [-26.410572, 152.925348]
];

L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.1}).addTo(map);

/* ================= RESPAWNS ================= */
const respawns = {
  red: [-26.41025,152.92575],
  green: [-26.41010,152.92600]
};

Object.values(respawns).forEach(r=>{
  L.circle(r,{radius:5,color:"white"}).addTo(map);
});

/* ================= LOBBY ================= */
function selectTeam(t){ selectedTeam = t; }

function joinGame(){

  const name = document.getElementById("name").value;
  if(!name || !selectedTeam){
    alert("Enter name + team");
    return;
  }

  team = selectedTeam;

  navigator.geolocation.getCurrentPosition(pos=>{

    db.ref("players/"+playerId).set({
      name,
      team,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      camped:false,
      lastHit:0,
      lastSeen:Date.now()
    });

  });

  document.getElementById("waiting").style.display="block";
}

/* ================= ADMIN ACTIONS ================= */
function startGame(){
  db.ref("game").set({
    state:"countdown",
    countdownStart:Date.now()
  });
}

function stopGame(){
  db.ref("game").update({
    state:"ended",
    winner:"none",
    endTime:Date.now()
  });
  showCenter("GAME STOPPED");
}

function resetGame(){
  db.ref("game").set({state:"lobby"});
  db.ref("scores").set({red:0,green:0});
  db.ref("domination").remove();
  showCenter("RESET DONE");
}

function spawnDomination(){
  const p = battlefieldCoords[Math.floor(Math.random()*battlefieldCoords.length)];
  db.ref("domination").set({lat:p[0],lng:p[1],controlling:null});
  showCenter("DOMINATION SPAWNED");
}

/* ================= GAME STATE ================= */
db.ref("game").on("value",snap=>{
  const g=snap.val();
  if(!g) return;

  if(g.state==="countdown"){
    const t=20-Math.floor((Date.now()-g.countdownStart)/1000);

    showCenter("STARTING IN "+t);

    if(t<=5 && t>0) navigator.vibrate(100);

    if(t<=0){
      db.ref("game").update({
        state:"live",
        startTime:Date.now()
      });
    }
  }

  if(g.state==="live"){
    document.getElementById("lobby").style.display="none";
    showCenter("GAME ON GO!");
    navigator.vibrate([300,200,300,200,800]);
  }

  if(g.state==="ended"){
    showCenter("GAME OVER\nWINNER: "+(g.winner||"unknown"));
    navigator.vibrate([600,200,600,200,1000]);
  }
});

/* ================= TIMER ================= */
setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    const g=s.val();
    if(!g || g.state!=="live") return;

    const remain=600-Math.floor((Date.now()-g.startTime)/1000);

    document.getElementById("hud").innerHTML="Time: "+remain+"s";

    if(remain<=0){
      db.ref("scores").once("value").then(sc=>{
        const s=sc.val();

        let winner="draw";
        if(s.red>s.green) winner="red";
        if(s.green>s.red) winner="green";

        db.ref("game").update({
          state:"ended",
          winner
        });
      });
    }
  });
},1000);

/* ================= CAMPING ================= */
let lastLat,lastLng,lastMove=Date.now();

function checkCamping(lat,lng){
  if(lastLat){
    if(map.distance([lastLat,lastLng],[lat,lng])>5){
      lastMove=Date.now();
    }
  }
  lastLat=lat; lastLng=lng;
  return (Date.now()-lastMove)>60000;
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{

  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;

  const camped=checkCamping(lat,lng);

  db.ref("players/"+playerId).update({
    lat,lng,camped,lastSeen:Date.now()
  });

  checkRespawn(lat,lng);
  checkDomination(lat,lng);

},{enableHighAccuracy:true});

/* ================= RENDER ================= */
const markers={};

db.ref("players").on("value",snap=>{
  const data=snap.val();
  if(!data) return;

  Object.keys(data).forEach(id=>{
    const p=data[id];
    if(!p.lat||!p.lng) return;

    let visible=true;

    if(p.team!==team && !p.camped){
      visible=false;
    }

    if(!visible){
      if(markers[id]){
        map.removeLayer(markers[id]);
        delete markers[id];
      }
      return;
    }

    const color=p.team==="red"?"red":"lime";

    const icon=L.divIcon({
      html:`<div style="width:10px;height:10px;background:${color};border-radius:50%"></div>`
    });

    if(!markers[id]){
      markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
    } else {
      markers[id].setLatLng([p.lat,p.lng]);
    }
  });
});

/* ================= DOMINATION ================= */
let domCircle;

setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    if(s.val().state!=="live") return;

    const p=battlefieldCoords[Math.floor(Math.random()*battlefieldCoords.length)];

    db.ref("domination").set({
      lat:p[0],
      lng:p[1],
      controlling:null
    });

  });
},180000);

db.ref("domination").on("value",snap=>{
  const d=snap.val();
  if(!d) return;

  if(domCircle) map.removeLayer(domCircle);

  domCircle=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(map);
});

function checkDomination(lat,lng){
  db.ref("domination").once("value").then(s=>{
    const d=s.val();
    if(!d) return;

    if(map.distance([lat,lng],[d.lat,d.lng])<3){
      db.ref("domination").update({controlling:team});
    }
  });
}

setInterval(()=>{
  db.ref("domination").once("value").then(s=>{
    const d=s.val();
    if(!d||!d.controlling) return;

    db.ref("scores/"+d.controlling)
      .transaction(v=>(v||0)+1);
  });
},1000);

/* ================= RESPAWN ================= */
function checkRespawn(lat,lng){

  const r=respawns[team];
  if(!r) return;

  if(map.distance([lat,lng],r)<3){

    db.ref("players/"+playerId).once("value").then(s=>{
      const p=s.val();

      if(Date.now()-p.lastHit>20000){

        db.ref("players/"+playerId).update({
          lastHit:Date.now()
        });

        navigator.vibrate(200);
        showCenter("RESPAWN");
      }
    });
  }
}

/* ================= UI ================= */
function showCenter(text){
  const el=document.getElementById("centerText");
  el.innerText=text;
  el.style.display="block";
  setTimeout(()=>el.style.display="none",2000);
}

</script>

</body>
</html>
