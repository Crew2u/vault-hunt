<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; }
    #map { height:100vh; }

    #lobby {
      position:fixed;
      inset:0;
      background:#0b0f14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:9999;
    }

    input {
      padding:10px;
      margin:10px;
      width:220px;
      text-align:center;
    }

    button {
      padding:12px 20px;
      margin:6px;
      cursor:pointer;
    }

    .red { background:#ff2b2b; color:white; border:none; }
    .green { background:#00c853; color:white; border:none; }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:1000;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      color:white;
      font-size:32px;
      z-index:9999;
      text-align:center;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h2 style="color:#00ff9d;">DOMINATION</h2>
  <input id="name" placeholder="Callsign">

  <div>
    <button class="red" onclick="selectTeam('red')">Red</button>
    <button class="green" onclick="selectTeam('green')">Green</button>
  </div>

  <button onclick="joinGame()">JOIN GAME</button>
  <button onclick="startGame()">START (ADMIN)</button>

  <div id="waiting" style="display:none;">Waiting for game start...</div>
</div>

<div id="hud">Waiting...</div>
<div id="centerText"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team = null;
let playerName = "";
let selectedTeam = null;

/* ================= MAP ================= */
const map = L.map('map').setView([-26.4103,152.9258],18);

const street = L.tileLayer(
  'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
  { opacity: 0.6 }
).addTo(map);

/* ================= FIELD ================= */
const battlefieldCoords = [
  [-26.410576, 152.925350],
  [-26.410366, 152.926038],
  [-26.410200, 152.926429],
  [-26.409833, 152.926069],
  [-26.409696, 152.925928],
  [-26.409809, 152.925480],
  [-26.410572, 152.925348]
];

L.polygon(battlefieldCoords,{
  color:"#00bfff",
  fillOpacity:0.1
}).addTo(map);

/* ================= RESPAWNS ================= */
const respawns = {
  red: [-26.4105,152.9253],
  green: [-26.4099,152.9262]
};

Object.values(respawns).forEach(r=>{
  L.circle(r,{radius:5,color:"white"}).addTo(map);
});

/* ================= LOBBY ================= */
function selectTeam(t){ selectedTeam = t; }

function joinGame(){

  const name = document.getElementById("name").value;
  if(!name || !selectedTeam){
    alert("Enter name and team");
    return;
  }

  playerName = name;
  team = selectedTeam;

  db.ref("players/"+playerId).set({
    name,
    team,
    lastSeen: Date.now()
  });

  document.getElementById("waiting").style.display = "block";
}

/* ================= ADMIN ================= */
function startGame(){
  db.ref("game").set({
    state: "countdown",
    countdownStart: Date.now()
  });
}

/* ================= GAME STATE ================= */
db.ref("game").on("value", snap=>{
  const g = snap.val();
  if(!g) return;

  if(g.state === "countdown"){
    const t = 20 - Math.floor((Date.now()-g.countdownStart)/1000);
    showCenter("Starting in "+t);

    if(t <= 0){
      db.ref("game").update({
        state:"live",
        startTime: Date.now()
      });
    }
  }

  if(g.state === "live"){
    document.getElementById("lobby").style.display="none";
    showCenter("GAME ON GO!",2000);
  }

  if(g.state === "ended"){
    showCenter("GAME OVER",5000);
  }
});

/* ================= TIMER ================= */
setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    const g = s.val();
    if(!g || g.state !== "live") return;

    const remain = 600 - Math.floor((Date.now()-g.startTime)/1000);
    document.getElementById("hud").innerHTML = "Time: "+remain;

    if(remain <= 0){
      db.ref("game").update({state:"ended"});
    }
  });
},1000);

/* ================= MOVEMENT ================= */
let lastLat, lastLng, lastMove = Date.now();

function checkCamping(lat,lng){
  if(lastLat){
    const d = map.distance([lastLat,lastLng],[lat,lng]);
    if(d > 5) lastMove = Date.now();
  }
  lastLat = lat; lastLng = lng;
  return (Date.now()-lastMove) > 60000;
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  const camped = checkCamping(lat,lng);

  db.ref("players/"+playerId).update({
    lat,lng,camped,lastSeen:Date.now()
  });

  checkRespawn(lat,lng);
  checkDomination(lat,lng);

},{enableHighAccuracy:true});

/* ================= RENDER ================= */
const markers = {};

db.ref("players").on("value", snap=>{
  const data = snap.val();
  if(!data) return;

  Object.keys(data).forEach(id=>{

    const p = data[id];
    if(!p.lat) return;

    let visible = true;

    if(p.team !== team && !p.camped){
      visible = false;
    }

    if(!visible){
      if(markers[id]){
        map.removeLayer(markers[id]);
        delete markers[id];
      }
      return;
    }

    const color = p.team==="red"?"red":"lime";

    const icon = L.divIcon({
      html:`<div style="width:10px;height:10px;background:${color};border-radius:50%"></div>`
    });

    if(!markers[id]){
      markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
    } else {
      markers[id].setLatLng([p.lat,p.lng]);
    }

  });
});

/* ================= DOMINATION ================= */
let domCircle;

setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    if(s.val().state !== "live") return;

    const point = battlefieldCoords[Math.floor(Math.random()*battlefieldCoords.length)];

    db.ref("domination").set({
      lat: point[0],
      lng: point[1],
      controlling: null
    });

  });
},180000);

db.ref("domination").on("value", snap=>{
  const d = snap.val();
  if(!d) return;

  if(domCircle) map.removeLayer(domCircle);

  domCircle = L.circle([d.lat,d.lng],{
    radius:3,
    color:"yellow"
  }).addTo(map);
});

function checkDomination(lat,lng){
  db.ref("domination").once("value").then(s=>{
    const d = s.val();
    if(!d) return;

    if(map.distance([lat,lng],[d.lat,d.lng]) < 3){
      db.ref("domination").update({controlling:team});
    }
  });
}

setInterval(()=>{
  db.ref("domination").once("value").then(s=>{
    const d = s.val();
    if(!d || !d.controlling) return;

    db.ref("scores/"+d.controlling)
      .transaction(v=>(v||0)+1);
  });
},1000);

/* ================= RESPAWN ================= */
function checkRespawn(lat,lng){
  const r = respawns[team];
  if(!r) return;

  if(map.distance([lat,lng],r) < 3){

    db.ref("players/"+playerId).once("value").then(s=>{
      const p = s.val();

      if(!p.lastHit || Date.now()-p.lastHit > 20000){

        db.ref("players/"+playerId).update({
          lastHit: Date.now()
        });

        navigator.vibrate(200);

      }
    });
  }
}

/* ================= UI ================= */
function showCenter(text,dur=2000){
  const el = document.getElementById("centerText");
  el.innerText = text;
  el.style.display="block";
  setTimeout(()=>el.style.display="none",dur);
}

</script>

</body>
</html>
