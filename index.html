<!DOCTYPE html>
<html>
<head>
  <title>Vault Hunt - FULL FIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; }

    #lobby {
      position:fixed;
      inset:0;
      background:#0b0f14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:9999;
    }

    input {
      padding:10px;
      margin:10px;
      width:220px;
      text-align:center;
    }

    button {
      padding:12px 20px;
      margin:6px;
      cursor:pointer;
    }

    .red { background:#ff2b2b; color:white; border:none; }
    .green { background:#00c853; color:white; border:none; }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.75);
      color:white;
      padding:10px;
      border-radius:10px;
      z-index:1000;
    }

    #warning {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      display:none;
      z-index:1000;
    }
  </style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby">
  <h2 style="color:#00ff9d;">VAULT HUNT</h2>
  <input id="name" placeholder="Enter Name">
  <button class="red" onclick="join('red')">Join Red</button>
  <button class="green" onclick="join('green')">Join Green</button>
</div>

<!-- HUD -->
<div id="hud">
  🔴 Red: <span id="redTime">0</span><br>
  🟢 Green: <span id="greenTime">0</span>
</div>

<div id="warning">⚠ OUT OF BATTLEFIELD</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId");
if(!playerId){
  playerId = Math.random().toString(36).substr(2,9);
  localStorage.setItem("playerId",playerId);
}

let team = null;
let playerName = "";
let pLastLat;
let pLastLng;
let lastMoveTime = Date.now();
/* ================= MAP ================= */
const map = L.map('map').setView([-26.4103,152.9258],18);

/* FIX MAP RENDER BUG */
setTimeout(()=>map.invalidateSize(),500);

/* BASE MAPS */
const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

street.addTo(map);

L.control.layers({
  "Street": street,
  "Satellite": satellite
}).addTo(map);

/* ================= YOUR EXACT FIELD ================= */
const battlefieldCoords = [
  [-26.410576, 152.925350],
  [-26.410366, 152.926038],
  [-26.410319, 152.926016],
  [-26.410285, 152.926102],
  [-26.410297, 152.926128],
  [-26.410200, 152.926429],
  [-26.410081, 152.926291],
  [-26.410020, 152.926272],
  [-26.409833, 152.926069],
  [-26.409810, 152.926023],
  [-26.409807, 152.925945],
  [-26.409696, 152.925928],
  [-26.409707, 152.925760],
  [-26.409786, 152.925749],
  [-26.409809, 152.925480],
  [-26.410572, 152.925348]
];

const battlefield = L.polygon(battlefieldCoords,{
  color:"#00bfff",
  weight:3,
  fillColor:"#00bfff",
  fillOpacity:0.12
}).addTo(map);

/* ================= INSIDE CHECK ================= */
function isInside(lat,lng){
  let inside=false;

  for(let i=0,j=battlefieldCoords.length-1;i<battlefieldCoords.length;j=i++){
    const xi=battlefieldCoords[i][0], yi=battlefieldCoords[i][1];
    const xj=battlefieldCoords[j][0], yj=battlefieldCoords[j][1];

    const intersect =
      ((yi>lng)!=(yj>lng)) &&
      (lat < (xj-xi)*(lng-yi)/(yj-yi)+xi);

    if(intersect) inside=!inside;
  }

  return inside;
}

/* ================= JOIN ================= */
function join(selectedTeam){

  playerName=document.getElementById("name").value;
  if(!playerName){alert("Enter name");return;}

  team=selectedTeam;
  document.getElementById("lobby").style.display="none";

  navigator.geolocation.watchPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
// 🧠 MOVEMENT DETECTION
let moved = true;

if (pLastLat !== undefined) {

  const d = map.distance(
    [pLastLat, pLastLng],
    [lat, lng]
  );

  if (d > 5) {
    moved = true;
    lastMoveTime = Date.now();
  } else {
    moved = false;
  }
}

// store last position
pLastLat = lat;
pLastLng = lng;

// ⏱️ CAMP CHECK (60 seconds)
const camped = (Date.now() - lastMoveTime) > 60000;
    console.log("CAMP STATUS:", camped, "LastMove:", lastMoveTime);
  db.ref("players/"+playerId).update({
  lat: lat,
  lng: lng,
  team: team,
  name: playerName,
  lastSeen: Date.now(),
  lastMoveTime: lastMoveTime,
  camped: camped
});

    map.setView([lat,lng]);

    document.getElementById("warning").style.display =
      isInside(lat,lng) ? "none" : "block";

  },err=>alert(err.message),{
    enableHighAccuracy:true
  });
}

/* ================= PLAYER RENDER ENGINE (THIS WAS MISSING) ================= */
const markers = {};

function dot(color){
  return L.divIcon({
    className:"",
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color};"></div>`,
    iconSize:[12,12],
    iconAnchor:[6,6]
  });
}

db.ref("players").on("value",snap=>{

  const data = snap.val();
  if(!data) return;

  Object.keys(data).forEach(id=>{

    const p=data[id];
    if(!p.lat||!p.lng) return;

    const color = p.team==="red" ? "red" : "lime";

    if(!markers[id]){
      markers[id]=L.marker([p.lat,p.lng],{
        icon:dot(color)
      }).addTo(map);
    } else {
      markers[id]
        .setLatLng([p.lat,p.lng])
        .setIcon(dot(color));
    }

  });

});

/* ================= SCOREBOARD ================= */
db.ref("game").on("value",snap=>{
  const g=snap.val()||{};
  document.getElementById("redTime").innerText=g.redTime||0;
  document.getElementById("greenTime").innerText=g.greenTime||0;
});

</script>

</body>
</html>
