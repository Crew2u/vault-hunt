<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - FINAL STABLE BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#000; color:white; overflow:hidden; }

    .screen { position:fixed; inset:0; display:none; }

    #lobby {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:8px; cursor:pointer; }

    button { padding:10px 14px; margin:6px; }

    #map, #adminMap { width:100%; height:100%; }

    #scoreboardGame, #scoreboardAdmin, #timer {
      position:absolute;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #scoreboardGame, #scoreboardAdmin { top:10px; left:10px; }

    #timer { top:10px; left:50%; transform:translateX(-50%); }

    #adminControls {
      position:absolute;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      z-index:2000;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>

  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>

  <div style="margin-top:20px; opacity:0.3; cursor:pointer;" onclick="adminLogin()">
    ADMIN
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div id="adminMap"></div>

  <div id="scoreboardAdmin">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>

  <div id="adminControls">
    <button onclick="startGame()">START</button>
    <button onclick="stopGame()">END</button>
    <button onclick="setDomination()">SET POINT</button>
    <button onclick="exitAdmin()">EXIT</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey:"AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain:"vault-hunt.firebaseapp.com",
  databaseURL:"https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();

/* GLOBALS */
let map=null, adminMap=null;
let playerId=localStorage.getItem("playerId")||Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team=null;
const gameMarkers={}, adminMarkers={};

let tempPoint=null, previewMarker=null;

/* BATTLEFIELD */
const battlefieldCoords=[
[-26.410576,152.925350],[-26.410366,152.926038],[-26.410319,152.926016],
[-26.410285,152.926102],[-26.410297,152.926128],[-26.410200,152.926429],
[-26.410081,152.926291],[-26.410020,152.926272],[-26.409833,152.926069],
[-26.409810,152.926023],[-26.409807,152.925945],[-26.409696,152.925928],
[-26.409707,152.925760],[-26.409786,152.925749],[-26.409809,152.925480],
[-26.410572,152.925348]
];

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="flex";

  setTimeout(()=>{
    if(map) map.invalidateSize();
    if(adminMap) adminMap.invalidateSize();
  },300);
}

/* 🔥 GUARANTEED BATTLEFIELD DRAW */
function drawBattlefield(targetMap){
  L.polygon(battlefieldCoords,{
    color:"#00bfff",
    fillOpacity:0.4
  }).addTo(targetMap);
}

/* MAP */
function initMap(){
  if(map) return;

  map=L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(map);

  drawBattlefield(map); // 🔥 ALWAYS applied
}

/* ADMIN MAP */
function initAdminMap(){
  if(adminMap) return;

  adminMap=L.map('adminMap').setView([-26.4103,152.9258],18);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(adminMap);

  drawBattlefield(adminMap); // 🔥 FIXED HERE

  adminMap.on("click",e=>{
    tempPoint=e.latlng;

    if(previewMarker){
      previewMarker.setLatLng(e.latlng);
    } else {
      previewMarker=L.circleMarker(e.latlng,{radius:10,color:"yellow"}).addTo(adminMap);
    }
  });
}

/* TEAM */
function selectTeam(t){ team=t; }

/* JOIN */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  navigator.geolocation.watchPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  });
}

/* ADMIN */
function adminLogin(){
  if(prompt("Admin Code")==="1288"){
    showScreen("adminScreen");
    initAdminMap();
  }
}

function exitAdmin(){
  showScreen("lobby");
}

/* CAPTURE */
function setDomination(){
  if(!tempPoint) return alert("Tap map first");
  db.ref("dominationPoint").set(tempPoint);
}

/* PLAYER MARKERS */
db.ref("players").on("value",snap=>{
  const data=snap.val()||{};

  Object.keys(data).forEach(id=>{
    const p=data[id];
    if(!p.lat) return;

    const icon=L.divIcon({
      html:`<div style="width:14px;height:14px;background:${p.team==="red"?"red":"lime"};border-radius:50%;"></div>`
    });

    if(map){
      if(!gameMarkers[id]){
        gameMarkers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
      } else gameMarkers[id].setLatLng([p.lat,p.lng]);
    }

    if(adminMap){
      if(!adminMarkers[id]){
        adminMarkers[id]=L.marker([p.lat,p.lng],{icon}).addTo(adminMap);
      } else adminMarkers[id].setLatLng([p.lat,p.lng]);
    }
  });
});

</script>

</body>
</html>
