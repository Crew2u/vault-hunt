<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - SAFE BASE FINAL FIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    .screen {
      position:fixed;
      inset:0;
      display:none;
    }

    #lobby {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    #map, #adminMap {
      width:100%;
      height:100%;
    }

    #scoreboardGame {
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #timer {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #adminControls {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:2000;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
      text-align:center;
    }

    #adminControls button {
      margin:5px;
      padding:10px 14px;
    }

    #overlay {
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.85);
      z-index:9999;
      font-size:60px;
      font-weight:bold;
    }

    #adminBtn {
      position:absolute;
      bottom:10px;
      right:10px;
      width:40px;
      height:40px;
      opacity:0.05;
      z-index:10000;
    }
  </style>
</head>

<body>

<div id="overlay"></div>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:flex;">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>

  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="map"></div>
  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div id="adminMap"></div>

  <div id="scoreboardGame">🔴 0 | 🟢 0</div>
  <div id="timer">15:00</div>

  <div id="adminControls">
    <button onclick="startGame()">START</button>
    <button onclick="stopGame()">STOP</button>
    <button onclick="setDomination()">SET POINT</button>
    <button onclick="exitAdmin()">EXIT</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* PLAYER */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team=null;

/* STATE */
let map=null, adminMap=null;
let lastDominationPoint=null;
let domRenderGame=null, domRenderAdmin=null;
let timerInterval=null;

/* 🔥 RESTORED BATTLEFIELD */
const battlefieldCoords = [
  [-26.410576,152.925350],
  [-26.410366,152.926038],
  [-26.410319,152.926016],
  [-26.410285,152.926102],
  [-26.410297,152.926128],
  [-26.410200,152.926429],
  [-26.410081,152.926291],
  [-26.410020,152.926272],
  [-26.409833,152.926069],
  [-26.409810,152.926023],
  [-26.409807,152.925945],
  [-26.409696,152.925928],
  [-26.409707,152.925760],
  [-26.409786,152.925749],
  [-26.409809,152.925480],
  [-26.410572,152.925348]
];

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  setTimeout(()=>{
    if(map) map.invalidateSize();
    if(adminMap) adminMap.invalidateSize();
  },300);
}

/* MAP INIT */
function initMap(){
  if(map) return;

  map=L.map('map').setView([-26.4103,152.9258],18);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

  /* 🔥 battlefield restored */
  L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.4}).addTo(map);

  if(lastDominationPoint){
    domRenderGame=L.circle([lastDominationPoint.lat,lastDominationPoint.lng],{radius:3,color:"yellow"}).addTo(map);
  }
}

function initAdminMap(){
  if(adminMap) return;

  adminMap=L.map('adminMap').setView([-26.4103,152.9258],18);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(adminMap);

  /* 🔥 battlefield restored */
  L.polygon(battlefieldCoords,{color:"#00bfff",fillOpacity:0.4}).addTo(adminMap);

  adminMap.on("click",e=>{
    tempPoint=e.latlng;
  });

  if(lastDominationPoint){
    domRenderAdmin=L.circle([lastDominationPoint.lat,lastDominationPoint.lng],{radius:3,color:"yellow"}).addTo(adminMap);
  }
}

/* CAPTURE */
let tempPoint=null;
function setDomination(){
  if(!tempPoint) return alert("Tap map first");
  db.ref("dominationPoint").set(tempPoint);
}

db.ref("dominationPoint").on("value",snap=>{
  const d=snap.val();
  if(!d) return;

  lastDominationPoint=d;

  if(map){
    if(!domRenderGame) domRenderGame=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(map);
    else domRenderGame.setLatLng([d.lat,d.lng]);
  }

  if(adminMap){
    if(!domRenderAdmin) domRenderAdmin=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(adminMap);
    else domRenderAdmin.setLatLng([d.lat,d.lng]);
  }
});

/* TEAM */
function selectTeam(t){ team=t; }

/* JOIN */
function joinGame(){
  const name=document.getElementById("name").value;
  if(!name||!team) return alert("Enter name + team");

  showScreen("gameScreen");
  initMap();

  navigator.geolocation.watchPosition(pos=>{
    db.ref("players/"+playerId).set({
      name,team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  });
}

/* ADMIN */
function adminLogin(){
  if(prompt("Admin Code")==="1288"){
    showScreen("adminScreen");
    initAdminMap();
  }
}
function exitAdmin(){ showScreen("lobby"); }

/* GAME CONTROL */
function startGame(){
  db.ref("game").set({state:"live",start:Date.now()});
}

function stopGame(){
  db.ref("game").set({state:"ended"});
}

/* TIMER */
db.ref("game").on("value",snap=>{
  const g=snap.val();
  if(!g) return;

  clearInterval(timerInterval);

  if(g.state==="live"){
    showOverlay("GAME STARTED");

    timerInterval=setInterval(()=>{
      let remaining=900-Math.floor((Date.now()-g.start)/1000);
      if(remaining<0) remaining=0;

      const m=String(Math.floor(remaining/60)).padStart(2,"0");
      const s=String(remaining%60).padStart(2,"0");

      document.querySelectorAll("#timer").forEach(t=>t.innerText=`${m}:${s}`);

      if(remaining===0){
        clearInterval(timerInterval);
        showOverlay("GAME OVER");
      }
    },1000);
  }

  if(g.state==="ended"){
    document.querySelectorAll("#timer").forEach(t=>t.innerText="00:00");
    showOverlay("GAME OVER");
  }
});

/* OVERLAY */
function showOverlay(text){
  const el=document.getElementById("overlay");
  el.innerText=text;
  el.style.display="flex";
  setTimeout(()=>el.style.display="none",5000);
}

</script>

</body>
</html>
