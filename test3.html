<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domination System Stable</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#000; color:white; }

.screen { display:none; }
.active { display:block; }

#map, #adminMap {
  width:100%;
  height:100vh;
}

#scoreboard {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.75);
  padding:8px 14px;
  border-radius:10px;
  font-weight:bold;
  z-index:9999;
}

#adminControls {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
}

button {
  padding:10px;
  margin:5px;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.2;}
  100% {opacity:1;}
}
</style>
</head>

<body>

<div id="scoreboard">🔴 0 | 🟢 0</div>

<div id="playerScreen" class="screen active">
  <div id="map"></div>
</div>

<div id="adminScreen" class="screen">
  <div id="adminMap"></div>

  <div id="adminControls">
    <button onclick="setDomination()">SET POINT</button>
    <button onclick="startGame()">START</button>
    <button onclick="stopGame()">STOP</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  databaseURL:"YOUR_DB"
});
const db = firebase.database();

/* STATE */
let map, adminMap;
let playerId="p_"+Math.random().toString(36).substr(2,9);
let team="red";

let dominationTemp=null;

const playerMarkers={};
const adminMarkers={};
let domMain=null;
let domAdmin=null;

/* 🔥 BATTLEFIELD (RESTORED) */
const battlefieldCoords=[
  [-26.410576,152.925350],
  [-26.410366,152.926038],
  [-26.410319,152.926016],
  [-26.410285,152.926102],
  [-26.410297,152.926128],
  [-26.410200,152.926429],
  [-26.410081,152.926291],
  [-26.410020,152.926272],
  [-26.409833,152.926069],
  [-26.409810,152.926023],
  [-26.409807,152.925945],
  [-26.409696,152.925928],
  [-26.409707,152.925760],
  [-26.409786,152.925749],
  [-26.409809,152.925480],
  [-26.410572,152.925348]
];

/* MAP INIT */
function initMap(){
  if(map) return;

  map=L.map("map").setView([-26.4103,152.9258],18);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  L.polygon(battlefieldCoords,{
    color:"#00bfff",
    fillOpacity:0.4
  }).addTo(map);
}

/* ADMIN MAP */
function initAdminMap(){
  if(adminMap) return;

  adminMap=L.map("adminMap").setView([-26.4103,152.9258],18);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(adminMap);

  L.polygon(battlefieldCoords,{
    color:"#00bfff",
    fillOpacity:0.4
  }).addTo(adminMap);

  adminMap.on("click",e=>{
    dominationTemp=e.latlng;
  });
}

/* SCREEN SWITCH */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* JOIN */
navigator.geolocation.watchPosition(pos=>{
  db.ref("players/"+playerId).set({
    lat:pos.coords.latitude,
    lng:pos.coords.longitude,
    team
  });

  if(map) map.setView([pos.coords.latitude,pos.coords.longitude]);
});

/* CLEANUP */
window.addEventListener("beforeunload",()=>{
  db.ref("players/"+playerId).remove();
});

/* PLAYERS */
db.ref("players").on("value",snap=>{
  const data=snap.val()||{};

  Object.keys(playerMarkers).forEach(id=>{
    if(!data[id]){
      if(map) map.removeLayer(playerMarkers[id]);
      if(adminMap) adminMap.removeLayer(playerMarkers[id]);
      delete playerMarkers[id];
    }
  });

  Object.entries(data).forEach(([id,p])=>{
    if(!p.lat) return;

    const icon=L.divIcon({
      html:`<div style="width:14px;height:14px;background:${p.team==="red"?"red":"lime"};border-radius:50%;border:2px solid white;"></div>`
    });

    if(!playerMarkers[id]){
      playerMarkers[id]=L.marker([p.lat,p.lng],{icon});
      if(map) playerMarkers[id].addTo(map);
      if(adminMap) playerMarkers[id].addTo(adminMap);
    } else {
      playerMarkers[id].setLatLng([p.lat,p.lng]);
    }
  });
});

/* 🔥 ADMIN DOT (FIXED + STABLE) */
db.ref("admin").on("value",snap=>{
  const a=snap.val();
  if(!a) return;

  const icon=L.divIcon({
    html:`<div style="width:18px;height:18px;background:purple;border-radius:50%;border:3px solid white;animation:blink 1s infinite;"></div>`
  });

  if(map){
    if(!adminMarkers.main){
      adminMarkers.main=L.marker([a.lat,a.lng],{icon}).addTo(map);
    } else adminMarkers.main.setLatLng([a.lat,a.lng]);
  }

  if(adminMap){
    if(!adminMarkers.admin){
      adminMarkers.admin=L.marker([a.lat,a.lng],{icon}).addTo(adminMap);
    } else adminMarkers.admin.setLatLng([a.lat,a.lng]);
  }
});

/* DOMINATION */
function setDomination(){
  if(!dominationTemp) return;

  db.ref("domination").set({
    lat:dominationTemp.lat,
    lng:dominationTemp.lng,
    active:false
  });
}

function startGame(){ db.ref("game").set({state:"live"}); }
function stopGame(){ db.ref("game").set({state:"ended"}); }

/* DOMINATION RENDER */
db.ref("domination").on("value",snap=>{
  const d=snap.val();
  if(!d) return;

  if(map){
    if(!domMain){
      domMain=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(map);
    } else domMain.setLatLng([d.lat,d.lng]);
  }

  if(adminMap){
    if(!domAdmin){
      domAdmin=L.circle([d.lat,d.lng],{radius:3,color:"yellow"}).addTo(adminMap);
    } else domAdmin.setLatLng([d.lat,d.lng]);
  }
});

/* SCOREBOARD (RESTORED) */
db.ref("scores").on("value",snap=>{
  const s=snap.val()||{red:0,green:0};
  document.getElementById("scoreboard").innerText=
    `🔴 ${s.red} | 🟢 ${s.green}`;
});

/* ADMIN LOGIN */
function adminLogin(){
  if(prompt("Admin Code")==="1288"){
    show("adminScreen");
    initAdminMap();

    navigator.geolocation.watchPosition(pos=>{
      db.ref("admin").set({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      });
    });
  }
}

/* INIT */
initMap();

/* SECRET ADMIN ENTRY */
document.body.addEventListener("dblclick",adminLogin);

</script>
</body>
</html>
