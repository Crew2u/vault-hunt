<!DOCTYPE html>
<html>
<head>
  <title>Domination Gelball - HUD BUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    #map {
      height:100vh;
      width:100%;
      filter: contrast(1.1) brightness(0.9);
    }

    /* ===== LOBBY ===== */
    #lobby {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle,#111,#000);
      z-index:9999;
    }

    input {
      padding:12px;
      margin:10px;
      width:240px;
      text-align:center;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .teamBtn { padding:14px 24px; margin:10px; cursor:pointer; }

    /* ===== ADMIN BUTTON (HIDDEN) ===== */
    #adminBtn {
      position:absolute;
      bottom:10px;
      right:10px;
      width:40px;
      height:40px;
      opacity:0.05;
      z-index:10000;
    }

    /* ===== ADMIN PANEL ===== */
    #adminScreen {
      position:fixed;
      inset:0;
      background:#000;
      display:none;
      z-index:10000;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    #adminScreen button {
      padding:16px 30px;
      margin:10px;
      font-size:18px;
      cursor:pointer;
    }

    /* ===== WAITING SCREEN ===== */
    #waitingScreen {
      position:fixed;
      inset:0;
      display:none;
      z-index:5000;
    }

    #hud {
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:8px;
      z-index:1000;
    }

    #centerText {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:34px;
      font-weight:bold;
      z-index:9999;
    }

  </style>
</head>

<body>

<!-- ===== LOBBY ===== -->
<div id="lobby">
  <h1>DOMINATION</h1>
  <input id="name" placeholder="CALLSIGN">

  <button class="teamBtn" onclick="selectTeam('red')">RED</button>
  <button class="teamBtn" onclick="selectTeam('green')">GREEN</button>

  <button onclick="joinGame()">JOIN GAME</button>

  <!-- 🔥 Hidden Admin Button -->
  <div id="adminBtn" onclick="adminLogin()"></div>
</div>

<!-- ===== ADMIN SCREEN ===== -->
<div id="adminScreen">
  <h2>ADMIN CONTROL</h2>

  <button onclick="startGame()">START GAME</button>
  <button onclick="stopGame()">STOP GAME</button>
  <button onclick="exitAdmin()">EXIT</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="waitingScreen">
  <div id="map"></div>
  <div id="hud">Waiting for game...</div>
</div>

<div id="centerText"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD8TsM63_vHw4WiS8UigODyokEMFohLMUo",
  authDomain: "vault-hunt.firebaseapp.com",
  databaseURL: "https://vault-hunt-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= PLAYER ================= */
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);

let team = null;

/* ================= ADMIN LOGIN ================= */
function adminLogin(){
  const code = prompt("Enter Admin Code");
  if(code === "1288"){
    document.getElementById("lobby").style.display = "none";
    document.getElementById("adminScreen").style.display = "flex";
  }
}

/* ================= ADMIN ACTIONS ================= */
function startGame(){
  db.ref("game").set({
    state:"live",
    startTime:Date.now()
  });
}

function stopGame(){
  db.ref("game").set({
    state:"ended"
  });
}

function exitAdmin(){
  document.getElementById("adminScreen").style.display = "none";
  document.getElementById("lobby").style.display = "flex";
}

/* ================= MAP ================= */
let map;

function initMap(){
  if(map) return;

  map = L.map('map').setView([-26.4103,152.9258],18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    opacity:0.8
  }).addTo(map);

  L.polygon([
    [-26.410576,152.925350],
    [-26.410366,152.926038],
    [-26.410319,152.926016],
    [-26.410285,152.926102],
    [-26.410297,152.926128],
    [-26.410200,152.926429],
    [-26.410081,152.926291],
    [-26.410020,152.926272],
    [-26.409833,152.926069],
    [-26.409810,152.926023],
    [-26.409807,152.925945],
    [-26.409696,152.925928],
    [-26.409707,152.925760],
    [-26.409786,152.925749],
    [-26.409809,152.925480],
    [-26.410572,152.925348]
  ], {
    color:"#00bfff",
    fillOpacity:0.5
  }).addTo(map);

  setTimeout(()=>map.invalidateSize(),400);
}

/* ================= TEAM ================= */
function selectTeam(t){ team = t; }

/* ================= JOIN ================= */
function joinGame(){
  const name = document.getElementById("name").value;
  if(!name || !team) return alert("Enter name + team");

  document.getElementById("lobby").style.display="none";
  document.getElementById("waitingScreen").style.display="block";

  initMap();

  navigator.geolocation.getCurrentPosition(pos=>{
    db.ref("players/"+playerId).set({
      name, team,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });
  });
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{
  db.ref("players/"+playerId).update({
    lat:pos.coords.latitude,
    lng:pos.coords.longitude
  });
});

/* ================= RENDER ================= */
const markers = {};

db.ref("players").on("value", snap=>{
  const data = snap.val();
  if(!data || !map) return;

  Object.keys(data).forEach(id=>{
    const p = data[id];
    if(!p.lat || !p.lng) return;

    const color = p.team === "red" ? "red" : "lime";

    const icon = L.divIcon({
      html:`<div style="
        width:14px;height:14px;
        background:${color};
        border-radius:50%;
        box-shadow:0 0 12px ${color};
      "></div>`
    });

    if(!markers[id]){
      markers[id]=L.marker([p.lat,p.lng],{icon}).addTo(map);
    } else {
      markers[id].setLatLng([p.lat,p.lng]);
      markers[id].setIcon(icon);
    }
  });
});

/* ================= HUD ================= */
setInterval(()=>{
  db.ref("game").once("value").then(s=>{
    const g = s.val();
    if(!g) return;

    document.getElementById("hud").innerHTML =
      "STATE: " + g.state;
  });
},1000);

</script>

</body>
</html>
